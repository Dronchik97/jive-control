<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Server | Poltava</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #00ff41; padding: 30px; border-radius: 20px; background: #111; display: inline-block; width: 320px; }
        input { background: #000; border: 1px solid #333; color: #00ff41; padding: 12px; width: 85%; margin: 15px 0; text-align: center; font-size: 18px; }
        .btn-bt { background: #0088ff; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; margin-bottom: 20px; }
        .btn-server { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; }
        #log { font-size: 11px; color: #666; text-align: left; margin-top: 20px; height: 100px; overflow-y: auto; border-top: 1px solid #222; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🖥️ SERVER ADM UNIT</h3>
        
        <button class="btn-bt" onclick="connectBT()">🔗 ПІДКЛЮЧИТИ ІГРАШКУ</button>
        <div id="btStat" style="font-size: 12px; margin-bottom: 15px; color: #ff4141;">СТАТУС: OFF</div>

        <hr style="border: 0.5px solid #222;">

        <input type="text" id="roomId" placeholder="ВВЕДИ ID ПАРОЛЬ">
        <button class="btn-server" onclick="startServer()">📡 ЗАПУСТИТИ СЕРВЕР</button>
        
        <div id="log"></div>
    </div>

    <script>
        let toyChar, mqttClient;

        function addLog(m) {
            document.getElementById('log').innerHTML += `> ${m}<br>`;
        }

        // ПРЯМЕ ПІДКЛЮЧЕННЯ БЕЗ ГЛЮКІВ
        async function connectBT() {
            try {
                addLog("Шукаю іграшку...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb']
                });

                const server = await device.gatt.connect();
                addLog("З'єднано з: " + device.name);
                
                const services = await server.getPrimaryServices();
                for (let s of services) {
                    const chars = await s.getCharacteristics();
                    toyChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                    if (toyChar) break;
                }

                if (toyChar) {
                    document.getElementById('btStat').innerText = "✅ ПІДКЛЮЧЕНО";
                    document.getElementById('btStat').style.color = "#00ff41";
                }
            } catch (e) {
                addLog("BT Error: " + e.message);
                alert("Помилка Блютуз: " + e.message);
            }
        }

        function startServer() {
            const id = document.getElementById('roomId').value;
            if(!id) return alert("Впиши пароль!");

            mqttClient = mqtt.connect('wss://test.mosquitto.org:8081');
            mqttClient.on('connect', () => {
                addLog("Сервер в мережі! Канал: " + id);
                mqttClient.subscribe("jive/" + id);
            });

            mqttClient.on('message', (topic, msg) => {
                const data = JSON.parse(msg.toString());
                if (toyChar) {
                    // Шлемо байти на вібрацію
                    toyChar.writeValueWithoutResponse(new Uint8Array([0xFF, data.m1, data.m2]));
                }
            });
        }
    </script>
</body>
</html>
