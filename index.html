<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .conn { background: #0066ff; color: #fff; }
        .start { background: #ff00ff; color: #fff; }
        .stop { background: #f00; color: #fff; }
        #disp { font-size: 24px; margin: 20px; color: #fff; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: ULTIMATE BRUTEFORCER</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn conn" onclick="conn()">🔌 1. КОННЕКТ</button>
        
        <div id="disp">Пакет: [?, ?]</div>
        
        <button class="btn start" id="b3" onclick="autoScan(3)">🚀 СКАН ЗАГОЛОВКА 3</button>
        <button class="btn start" id="b5" onclick="autoScan(5)">🚀 СКАН ЗАГОЛОВКА 5</button>
        <button class="btn stop" onclick="stopScan()">🛑 СТОП</button>
    </div>

    <script>
        let d, c, scanner;
        let currentIdx = 1;

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 CONNECTED";
            } catch (e) { alert(e); }
        }

        async function autoScan(header) {
            if(!c) return;
            currentIdx = 1;
            scanner = setInterval(async () => {
                if(currentIdx > 100) { stopScan(); return; }
                
                document.getElementById('disp').innerText = `Пакет: [${header}, ${currentIdx}]`;
                
                try {
                    // Шлемо комбінацію заголовок + індекс
                    await c.writeValueWithoutResponse(new Uint8Array([header, currentIdx]));
                } catch (e) {}

                currentIdx++;
            }, 300); // Швидкий перебір (0.3 сек), бо нам треба знайти хоч якийсь шорох
        }

        function stopScan() {
            clearInterval(scanner);
            document.getElementById('st').innerText = "🛑 ЗУПИНЕНО";
        }
    </script>
</body>
</html>
