<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #ffaa00; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 14px; }
        .conn { background: #0066ff; color: white; }
        .h18 { background: #ffaa00; color: black; }
        .h19 { background: #ff5500; color: white; }
        #disp { font-size: 40px; margin: 20px; color: #ffaa00; background: #222; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: DEEP SCAN (H18/H19)</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn conn" onclick="conn()">🔌 1. КОННЕКТ</button>
        
        <div id="disp">0</div>
        
        <button class="btn h18" onclick="runScan(18)">🚀 ТОЧНИЙ СКАН H18</button>
        <button class="btn h19" onclick="runScan(19)">🚀 ТОЧНИЙ СКАН H19</button>
        
        <button class="btn" style="background:red; color:white; margin-top:20px;" onclick="stopScan()">🛑 СТОП</button>
    </div>

    <script>
        let d, ch, scanner;
        let val = 1;
        const blackList = [8, 10];

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
            } catch (e) { alert(e); }
        }

        async function runScan(header) {
            if(!ch) return;
            val = 1;
            clearInterval(scanner);
            document.getElementById('st').innerText = "📡 ПЕРЕБІР H" + header;

            scanner = setInterval(async () => {
                if(val > 255) { stopScan(); return; }
                if(blackList.includes(val)) { val++; return; }

                document.getElementById('disp').innerText = val;
                try {
                    // Шлемо 3-байтовий пакет на нових заголовках
                    await ch.writeValueWithoutResponse(new Uint8Array([header, val, 1]));
                } catch (e) {}
                val++; 
            }, 150); 
        }

        function stopScan() {
            clearInterval(scanner);
            document.getElementById('st').innerText = "🛑 ЗУПИНЕНО";
        }
    </script>
</body>
</html>
