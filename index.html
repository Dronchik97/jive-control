<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: auto; padding: 20px; }
        button { padding: 15px; border: 1px solid #0f0; background: #222; color: #0f0; cursor: pointer; font-weight: bold; }
        button:active { background: #0f0; color: #000; }
        .conn { width: 90%; background: #0044ff; color: #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <h3>JIVE MODE SCANNER</h3>
    <p>Шукаємо вібро по індексах. Якщо зависне — вирубай Bluetooth!</p>

    <button class="conn" onclick="conn()">🔌 1. ПІДКЛЮЧИТИСЬ</button>

    <div class="grid">
        <!-- Пробуємо індекси від 1 до 12 -->
        <button onclick="send(1)">1</button>
        <button onclick="send(2)">2</button>
        <button onclick="send(3)">3</button>
        <button onclick="send(4)">4</button>
        <button onclick="send(5)">5</button>
        <button onclick="send(6)">6</button>
        <button onclick="send(7)">7</button>
        <button onclick="send(8)" style="border-color: red;">8 (Твої толкачки)</button>
        <button onclick="send(9)">9</button>
        <button onclick="send(10)">10</button>
        <button onclick="send(11)">11</button>
        <button onclick="send(12)">12</button>
    </div>

    <script>
        let ch;
        async function conn() {
            try {
                const d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, 
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                alert("ГОТОВО");
            } catch (e) { alert(e); }
        }

        async function send(val) {
            if(!ch) return;
            // Шлемо заголовок 1 і номер режиму
            await ch.writeValueWithoutResponse(new Uint8Array([1, val]));
            console.log("Sent Mode:", val);
        }
    </script>
</body>
</html>
