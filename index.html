<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; background: #333; color: white; }
        .vibe { background: #ff00ff; }
        input[type=range] { width: 100%; height: 30px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: VIBRO ONLY MODE</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn" style="background:#0066ff" onclick="conn()">🔌 1. КОННЕКТ</button>

        <div style="margin: 20px 0;">
            <label>ШУКАЄМО ВІБРО: <span id="pV">100</span></label>
            <input type="range" min="0" max="255" value="100" id="pwr">
        </div>

        <!-- Пробуємо канали, які зазвичай ідуть суто на вібро -->
        <button class="btn vibe" onclick="send([11, getV()])">ВІБРО (Канал 11)</button>
        <button class="btn vibe" onclick="send([16, getV()])">ВІБРО (Канал 16)</button>
        <button class="btn vibe" onclick="send([4, getV()])">ВІБРО (Канал 4)</button>
        <button class="btn vibe" onclick="send([1, 0, getV()])">ВІБРО (3-байт: 0, X)</button>

        <button class="btn" style="background:red" onclick="send([1, 0])">🛑 СТОП</button>
    </div>

    <script>
        let d, c;
        const getV = () => parseInt(document.getElementById('pwr').value);

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ГОТОВО";
            } catch (e) { alert(e); }
        }

        async function send(arr) {
            if (!c) return;
            try { await c.writeValueWithoutResponse(new Uint8Array(arr)); } catch (e) {}
        }
    </script>
</body>
</html>
