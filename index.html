<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 15px; margin: 5px; width: 140px; cursor: pointer; font-size: 12px; }
        button:active { background: #0f0; color: #000; }
        .group { border: 1px solid #333; margin: 10px; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h3>JIVE VIBE SCANNER</h3>
    <button onclick="conn()" style="width: 300px; border-width: 3px;">🔌 1. CONNECT</button>

    <div class="group">
        <p>КАНАЛ 1 (Класика MM)</p>
        <button onclick="test([1, 1, 150])">[1, 1, V]</button>
        <button onclick="test([1, 2, 150])">[1, 2, V]</button>
        <button onclick="test([1, 0, 150])">[1, 0, V]</button>
    </div>

    <div class="group">
        <p>КАНАЛ 11 (Часто у Jive)</p>
        <button onclick="test([11, 1, 150])">[11, 1, V]</button>
        <button onclick="test([11, 0, 150])">[11, 0, V]</button>
        <button onclick="test([11, 8, 150])">[11, 8, V]</button>
    </div>

    <div class="group">
        <p>КАНАЛ 16 (Спецрежими)</p>
        <button onclick="test([16, 1, 150])">[16, 1, V]</button>
        <button onclick="test([16, 0, 150])">[16, 0, V]</button>
    </div>

    <div class="group">
        <p>КАНАЛ 4 (Старі моделі)</p>
        <button onclick="test([4, 1, 150])">[4, 1, V]</button>
        <button onclick="test([4, 150])">[4, V] (2 байта)</button>
    </div>

    <button onclick="stop()" style="color:red; border-color:red; width: 300px;">🛑 СТОП</button>
    <div id="out" style="font-size: 10px; color: #666; margin-top: 10px;"></div>

    <script>
        let ch;
        async function conn() {
            const d = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
            });
            const s = await d.gatt.connect();
            const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
            ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
            document.getElementById('out').innerText = "Connected!";
        }

        async function test(arr) {
            if (!ch) return;
            const data = new Uint8Array(arr);
            document.getElementById('out').innerText = "Sent: " + arr;
            await ch.writeValueWithoutResponse(data);
        }

        async function stop() {
            if (ch) await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
        }
    </script>
</body>
</html>
