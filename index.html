<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Server | Admin</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .server-box { border: 2px solid #00ff41; padding: 30px; border-radius: 20px; background: #111; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        button { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        #log { font-size: 10px; color: #666; margin-top: 20px; height: 100px; overflow-y: auto; text-align: left; border-top: 1px solid #222; padding-top: 10px; }
        .status { margin-bottom: 20px; font-size: 18px; font-bold: true; }
    </style>
</head>
<body>

<div class="server-box">
    <h2>🛠️ JIVE SERVER</h2>
    <div class="status" id="btStat">ОЧІКУВАННЯ...</div>
    
    <button onclick="connectHardware()">ПІДКЛЮЧИТИ ЗАЛІЗО</button>
    
    <div id="log"></div>
</div>

<script>
    let toyChar;

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    async function connectHardware() {
        try {
            document.getElementById('btStat').innerText = "🔍 ШУКАЮ...";
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb'] 
            });

            const server = await device.gatt.connect();
            addLog("З'єднано з: " + device.name);

            // Шукаємо сервіс і характеристику
            const services = await server.getPrimaryServices();
            for (let service of services) {
                const chars = await service.getCharacteristics();
                toyChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                if (toyChar) {
                    addLog("Канал знайдено: " + service.uuid);
                    break;
                }
            }

            if (toyChar) {
                document.getElementById('btStat').innerText = "✅ ПІДКЛЮЧЕНО";
                document.getElementById('btStat').style.color = "#00ff41";
                startListening(); // Починаємо чекати команди з пульта
            }
        } catch (e) {
            addLog("Помилка: " + e.message);
            document.getElementById('btStat').innerText = "⚠️ ЗБІЙ";
        }
    }

    function startListening() {
        addLog("Сервер активний. Слухаю команди...");
        window.addEventListener('storage', (event) => {
            if (event.key === 'vibe_cmd') {
                const speed = parseInt(event.newValue);
                if (toyChar) {
                    toyChar.writeValueWithoutResponse(new Uint8Array([0xFF, speed]));
                    addLog("Команда: " + speed);
                }
            }
        });
    }
</script>
</body>
</html>
