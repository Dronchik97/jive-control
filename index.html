<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SERVER ADM UNIT | Byte Perfect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #00ff41; padding: 25px; border-radius: 20px; background: #111; display: inline-block; width: 360px; box-shadow: 0 0 20px #00ff41; }
        input { background: #000; border: 1px solid #333; color: #00ff41; padding: 15px; width: 80%; margin: 15px 0; text-align: center; border-radius: 10px; font-size: 20px; outline: none; }
        .btn-bt { background: #0088ff; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-start { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #log { font-size: 11px; color: #666; text-align: left; height: 100px; overflow-y: auto; border-top: 1px solid #222; margin-top: 20px; padding-top: 10px; }
        .check-box { color: #00ff41; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h3 style="letter-spacing: 2px;">🖥️ SERVER ADM UNIT</h3>
        
        <button class="btn-bt" onclick="connBT()">🔗 ПІДКЛЮЧИТИ ПРИСТРІЙ</button>
        <div id="btStatus" class="check-box">⬜ НЕ ПІДКЛЮЧЕНО</div>

        <hr style="border: 0.5px solid #222;">
        
        <input type="text" id="customId" value="1234">
        <button class="btn-start" onclick="startServer()">🚀 ЗАПУСТИТИ СЕРВЕР</button>
        
        <div id="log"></div>
    </div>

    <script>
        let ch, peer;
        const addLog = (m) => { document.getElementById('log').innerHTML += `> ${m}<br>`; };

        async function connBT() {
            try {
                const d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('btStatus').innerText = "✅ ПІДКЛЮЧЕНО: " + d.name;
                addLog("З'єднано з: " + d.name);
            } catch(e) { addLog("BT Error: " + e.message); }
        }

        function startServer() {
            const myId = document.getElementById('customId').value;
            peer = new Peer(myId);
            
            peer.on('open', (id) => { 
                addLog("Спроба запуску сервера...");
                addLog("Сервер ОНЛАЙН. ID: " + id);
            });

            peer.on('connection', (conn) => {
                addLog("✅ ПУЛЬТ ПІДКЛЮЧЕНО!");
                conn.on('data', async (data) => {
                    if (!ch) return;
                    let v = data.val;
                    
                    if (data.type === 'v') { // Вібро (Твій довгий пакет)
                        let pkt = new Uint8Array([0x15, 0xFF, 0x04, 0x08, v, v, 0x00, 0x04, 0x08, v, v, 0x01]);
                        await ch.writeValueWithoutResponse(pkt);
                    } 
                    else if (data.type === 'p') { // Толкачка (Твій короткий пакет)
                        await ch.writeValueWithoutResponse(new Uint8Array([0x00, 0x08, v]));
                    }
                });
            });
        }
    </script>
</body>
</html>
