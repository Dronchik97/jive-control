<!DOCTYPE html>
<html>
<head>
    <title>Andrii Pusher Final</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        button { 
            padding: 20px; font-size: 18px; cursor: pointer; 
            border-radius: 10px; border: none; background: #27ae60; color: white;
            margin: 10px; width: 90%;
        }
        #status { color: #f1c40f; margin: 15px; border: 1px solid #333; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>Пульт для Андрія 🚀</h2>
    <div id="status">Статус: Тисни ПІДКЛЮЧИТИСЬ</div>
    
    <button onclick="connect()">1. ПІДКЛЮЧИТИСЬ</button>
    <br>
    <input type="range" id="speedRange" min="0" max="255" value="180" style="width:80%">
    <p>Швидкість: <span id="speedVal">180</span></p>
    
    <button onclick="sendCommand()">2. ТИСНИ — ТОЛКАЙ!</button>
    <button style="background:#c0392b" onclick="stopDevice()">3. СТОП</button>

    <script>
        let characteristic;
        const TARGET_CHAR = "78667579-7b48-43db-b8c5-7928a6b0a335";

        document.getElementById('speedRange').oninput = function() {
            document.getElementById('speedVal').innerText = this.value;
        };

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    // Тут ми не кажемо який сервіс шукати, ми кажемо ЯКІ дозволити
                    optionalServices: [
                        "0000ae00-0000-1000-8000-00805f9b34fb",
                        "0000ae01-0000-1000-8000-00805f9b34fb",
                        "3d3cbc0e-f76b-11e3-8fcd-b2227cce2b54"
                    ]
                });

                const server = await device.gatt.connect();
                document.getElementById('status').innerText = "Шукаю сервіси...";

                // Магія: перебираємо всі сервіси пристрою автоматично
                const services = await server.getPrimaryServices();
                
                for (const service of services) {
                    try {
                        const chars = await service.getCharacteristics();
                        const found = chars.find(c => c.uuid === TARGET_CHAR);
                        if (found) {
                            characteristic = found;
                            document.getElementById('status').innerText = "ЗНАЙШОВ! Сервіс: " + service.uuid.substring(0,8);
                            break;
                        }
                    } catch (e) { continue; }
                }

                if (!characteristic) {
                    throw new Error("Характеристика не знайдена в жодному сервісі!");
                }

                document.getElementById('status').innerText += " ✅ ГОТОВО";
            } catch (error) {
                document.getElementById('status').innerText = "Збій: " + error.message;
            }
        }

        async function sendCommand() {
            if (!characteristic) return alert("Спочатку підключись!");
            let speed = parseInt(document.getElementById('speedRange').value);
            // 0B (заголовок), 08 (толкачка), швидкість
            await characteristic.writeValue(new Uint8Array([0x0B, 0x08, speed]));
        }

        async function stopDevice() {
            if (characteristic) await characteristic.writeValue(new Uint8Array([0x0B, 0x08, 0x00]));
        }
    </script>
</body>
</html>
