<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .btn { padding: 15px; background: #0088cc; border: none; border-radius: 8px; color: white; width: 100%; font-size: 18px; margin-bottom: 20px; cursor: pointer; }
        input[type=range] { width: 100%; height: 40px; margin-top: 20px; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; background: #222; }
    </style>
</head>
<body>
    <h2>Jive Remote Control</h2>
    <button class="btn" onclick="connect()">🔌 ПІДКЛЮЧИТИСЬ ДО JIVE</button>
    <hr>
    <p>Потужність вібрації (0-15):</p>
    <input type="range" min="0" max="15" value="0" id="speedRange" oninput="updateSpeed(this.value)">
    <div id="status">Статус: Очікування підключення...</div>

    <script>
        let device, characteristic;
        // Твої точні UUID зі скріншотів
        const SERVICE_UUID = '78667579-7b48-43db-b8c5-7928a6b0a335';
        const CHAR_UUID    = '78667579-a914-49a4-8333-aa3c0cd8fedc';

        async function connect() {
            try {
                document.getElementById('status').innerText = "Шукаю пристрій CBT001...";
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'CBT001' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('status').innerText = "Статус: ПІДКЛЮЧЕНО ✅";
                document.getElementById('status').style.color = "#4CAF50";
            } catch (err) {
                document.getElementById('status').innerText = "Помилка: " + err;
                document.getElementById('status').style.color = "#ff5252";
            }
        }

       async function updateSpeed(val) {
    if (!characteristic) return;
    try {
        let speed = parseInt(val);
        // Спробуємо три варіанти команди (розкоментовуй по черзі, якщо перший не піде):
        
        // Варіант 1: Стандарт для Jive
        let data = new Uint8Array([0x0f, speed, 0x00]); 
        
        // Варіант 2: Якщо варіант 1 не робить (іноді треба 0x03 на початку)
        // let data = new Uint8Array([0x03, speed, 0x00]); 

        await characteristic.writeValueWithResponse(data);
        console.log("Відправлено швидкість: " + speed);
    } catch (err) {
        // Якщо помилка 'GATT operation not permitted', пробуємо без відповіді
        const data = new Uint8Array([0x0f, parseInt(val), 0x00]);
        await characteristic.writeValueWithoutResponse(data);
    }
}
            }
        }
    </script>
</body>
</html>
