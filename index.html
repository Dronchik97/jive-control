<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JIVE VIBRO FIX</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: 'Courier New', monospace; padding: 20px; }
        .panel { border: 3px solid #0f0; padding: 20px; border-radius: 20px; background: #010; max-width: 450px; margin: auto; box-shadow: 0 0 30px #0f03; }
        .btn { padding: 18px; margin: 8px 0; border: none; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .conn { background: #0066ff; color: #fff; }
        .turbo { background: #ff00ff; color: #fff; box-shadow: 0 0 15px #ff00ff; animation: blink 0.5s infinite; }
        .mode { background: #555; color: #fff; }
        .stop { background: #f00; color: #fff; margin-top: 20px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .status { margin-bottom: 15px; font-size: 14px; color: #0f0; }
        input[type=range] { width: 100%; height: 25px; margin: 15px 0; }
    </style>
</head>
<body>

<div class="panel">
    <h2>⚡ JIVE VIBRO FIX ⚡</h2>
    <div id="st" class="status">СТАТУС: ВІДКЛЮЧЕНО</div>
    
    <button class="btn conn" onclick="connect()">🔌 1. З'ЄДНАТИ ПРИСТРІЙ</button>

    <div style="border: 1px solid #333; padding: 10px; margin: 15px 0;">
        <label>ПОТУЖНІСТЬ (зараз: <span id="pV">150</span>)</label>
        <input type="range" min="0" max="255" value="150" id="pwr" oninput="document.getElementById('pV').innerText=this.value">
    </div>

    <button class="btn turbo" onclick="startTurbo()">🔥 ЗАПУСТИТИ TURBO VIBRO</button>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
        <button class="btn mode" onclick="send([5, getP()])">РЕЖИМ 5</button>
        <button class="btn mode" onclick="send([18, getP()])">РЕЖИМ 18</button>
        <button class="btn mode" onclick="send([1, getP(), 1])">ПАКЕТ 3-БАЙТИ</button>
        <button class="btn mode" onclick="send([1, getP(), 0, 0, 0, 0, 0, 0])">ПАКЕТ 8-БАЙТІВ</button>
    </div>

    <button class="btn stop" onclick="stopAll()">🛑 ПОВНИЙ СТОП</button>
</div>

<script>
    let device, char, loop;

    function getP() { return parseInt(document.getElementById('pwr').value); }

    async function connect() {
        try {
            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
            char = await service.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
            document.getElementById('st').innerText = "СТАТУС: ГОТОВО ДО БОЮ";
        } catch (e) { 
            document.getElementById('st').innerText = "ПОМИЛКА: " + e.message;
        }
    }

    async function send(arr) {
        if (!char) return;
        try {
            await char.writeValueWithoutResponse(new Uint8Array(arr));
        } catch (e) { console.log(e); }
    }

    function startTurbo() {
        stopAll();
        document.getElementById('st').innerText = "СТАТУС: TURBO ACTIVE";
        // Лупимо кожні 10мс. Це має злити "толкачки" в один гул
        loop = setInterval(() => {
            if(char) {
                // Шлемо випадкове мікро-коригування, щоб контролер не ігнорував однакові команди
                let val = getP();
                let drift = val + (Math.random() > 0.5 ? 1 : -1);
                char.writeValueWithoutResponse(new Uint8Array([1, drift]));
            }
        }, 10); 
    }

    function stopAll() {
        clearInterval(loop);
        if(char) char.writeValueWithoutResponse(new Uint8Array([1, 0]));
        document.getElementById('st').innerText = "СТАТУС: ПАУЗА";
    }
</script>

</body>
</html>
