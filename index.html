<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; text-align: center; padding: 20px; }
        .panel { border: 2px solid #00ff00; padding: 20px; display: inline-block; background: #050505; }
        button { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 12px; margin: 5px; cursor: pointer; width: 100px; font-weight: bold; }
        button:hover { background: #00ff00; color: #000; }
        .log { font-size: 11px; color: #888; margin-top: 15px; height: 60px; overflow: hidden; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: MODE X,8 CONTROL</h3>
        <button onclick="conn()" style="width: 220px; background: #111;">🔌 ПІДКЛЮЧИТИ (НОУТ)</button>
        
        <p>ТОЛКАЧКИ (Твій формат X,8):</p>
        <button onclick="send8(1)">1, 8</button>
        <button onclick="send8(2)">2, 8</button>
        <button onclick="send8(3)">3, 8</button>
        <button onclick="send8(4)">4, 8</button>
        <button onclick="send8(5)">5, 8</button>
        
        <p>ВІБРО (Окремий канал):</p>
        <input type="range" min="0" max="255" value="0" id="vS" style="width: 210px;" oninput="sendV()">
        <div id="vVal">0</div>

        <br>
        <button onclick="stop()" style="width: 220px; border-color: red; color: red;">🛑 ВИМКНУТИ ВСЕ</button>
        <div id="log" class="log">Чекаю коннект...</div>
    </div>

    <script>
        let ch;
        const logger = document.getElementById('log');

        async function conn() {
            try {
                const d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                logger.innerText = "Є контакт з " + d.name;
            } catch (e) { alert(e.message); }
        }

        async function send8(x) {
            if (!ch) return;
            // Шлемо рівно те, що спрацювало: Байт1 = X, Байт2 = 8
            let data = new Uint8Array([x, 8]);
            logger.innerText = "Шлю толкачки: " + x + ", 8";
            try {
                await ch.writeValueWithoutResponse(data);
            } catch (e) { logger.innerText = "Помилка: " + e.message; }
        }

        async function sendV() {
            if (!ch) return;
            let v = parseInt(document.getElementById('vS').value);
            document.getElementById('vVal').innerText = v;
            // Вібро зазвичай іде через заголовок 1 або 11. Пробуємо 1,0,V
            let data = new Uint8Array([1, 0, v]);
            try {
                await ch.writeValueWithoutResponse(data);
            } catch (e) {}
        }

        async function stop() {
            if (ch) {
                await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
                logger.innerText = "Зупинено";
            }
        }
    </script>
</body>
</html>
