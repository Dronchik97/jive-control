<!DOCTYPE html>
<html>
<head>
    <title>Jive Control - Audio Sensor</title>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #0f0; padding: 20px; border-radius: 15px; background: #111; }
        #meter { width: 100%; height: 20px; background: #222; margin: 15px 0; border: 1px solid #0f0; }
        #fill { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        button { background: #0f0; color: #000; border: none; padding: 15px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; width: 80%; }
        .status { font-size: 12px; margin: 10px; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🦾 JIVE-CONTROL: AUDIO</h2>
        <div id="btStat" class="status">Bluetooth: Не підключено</div>
        <button onclick="connectBT()">🔌 1. ПІДКЛЮЧИТИ ІГРАШКУ</button>
        <button onclick="startAudio()">🎤 2. СЛУХАТИ ДОНАТИ</button>
        
        <div id="meter"><div id="fill"></div></div>
        <p id="info">Рівень звуку: 0%</p>
    </div>

    <script>
        let ch;
        let audioContext, analyser, dataArray;

        async function connectBT() {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
            ch = await service.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
            document.getElementById('btStat').innerText = "✅ Bluetooth: ПІДКЛЮЧЕНО";
            document.getElementById('btStat').style.color = "#0f0";
        }

        async function startAudio() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            detect();
        }

        function detect() {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            let vol = Math.round(sum / dataArray.length);
            
            document.getElementById('fill').style.width = vol + "%";
            document.getElementById('info').innerText = "Рівень звуку: " + vol + "%";

            // Якщо звук гучний (наприклад більше 30) - шлемо вібрацію
            if (vol > 30 && ch) {
                let speed = Math.min(Math.round(vol / 4), 20); // Масштабуємо під твої 0-20
                ch.writeValueWithoutResponse(new Uint8Array([0x00, 0x08, speed]));
            } else if (ch) {
                ch.writeValueWithoutResponse(new Uint8Array([0x00, 0x08, 0])); // Стоп, якщо тихо
            }
            requestAnimationFrame(detect);
        }
    </script>
</body>
</html>
