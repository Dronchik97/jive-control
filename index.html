<!DOCTYPE html>
<html>
<head>
    <title>Pusher Control OK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        button { padding: 20px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #27ae60; color: white; margin: 10px; width: 90%; }
        .stop { background: #c0392b !important; }
        input[type=range] { width: 85%; height: 50px; margin: 20px 0; }
        #status { color: #f1c40f; margin: 15px; border: 1px solid #333; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>Толкачка для Андрія 🚀</h2>
    <div id="status">Статус: Треба натиснути ПІДКЛЮЧИТИСЬ</div>
    
    <button onclick="connect()">1. ПІДКЛЮЧИТИСЬ</button>
    
    <hr style="border: 0.5px solid #333; margin: 20px;">
    
    <p>Швидкість (Hex: <span id="hexVal">0x64</span>):</p>
    <input type="range" id="speedSlider" min="32" max="100" value="100">
    <div id="speedVal" style="font-size: 28px; font-weight: bold;">100</div>
    
    <button onclick="sendPush()">2. ЗАПУСТИТИ</button>
    <button class="stop" onclick="stopPush()">3. СТОП</button>

    <script>
        let characteristic;
        // Використовуємо сервіс, який ми бачили у nRF
        const SERVICE_UUID = "3d3cbc0e-f76b-11e3-8fcd-b2227cce2b54";
        const CHAR_UUID = "78667579-7b48-43db-b8c5-7928a6b0a335";

        const slider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedVal');
        const hexDisplay = document.getElementById('hexVal');

        slider.oninput = function() {
            speedDisplay.innerText = this.value;
            hexDisplay.innerText = "0x" + parseInt(this.value).toString(16).toUpperCase();
        };

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);

                document.getElementById('status').innerText = "✅ ПІДКЛЮЧЕНО: " + device.name;
            } catch (e) {
                document.getElementById('status').innerText = "❌ Помилка: " + e.message;
            }
        }

        async function sendPush() {
            if (!characteristic) return alert("Спочатку підключись!");
            try {
                let val = parseInt(slider.value);
                // Команда: 0B (11), 08 (канал), швидкість
                let data = new Uint8Array([0x0B, 0x08, val]);
                await characteristic.writeValue(data);
            } catch (e) {
                alert("Збій: " + e.message);
            }
        }

        async function stopPush() {
            if (characteristic) {
                await characteristic.writeValue(new Uint8Array([0x0B, 0x08, 0x00]));
            }
        }
    </script>
</body>
</html>
