<!DOCTYPE html>
<html>
<head>
    <title>Pusher Control Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        button { padding: 20px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #27ae60; color: white; margin: 10px; width: 90%; }
        .stop { background: #c0392b !important; }
        input[type=range] { width: 80%; height: 40px; margin: 20px 0; cursor: pointer; }
        #status { color: #f1c40f; margin: 15px; border: 1px solid #333; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Толкачка для Андрія (V3) 🚀</h2>
    <div id="status">Статус: Тисни ПІДКЛЮЧИТИСЬ</div>
    
    <button onclick="connect()">1. ПІДКЛЮЧИТИСЬ</button>
    
    <hr style="border: 0.5px solid #333; margin: 20px;">
    
    <p>Швидкість (Hex: <span id="hexVal">0x64</span>):</p>
    <input type="range" id="speedSlider" min="32" max="100" value="100">
    <div id="speedVal" style="font-size: 24px; font-weight: bold;">100</div>
    
    <button onclick="sendPush()">2. ЗАПУСТИТИ</button>
    <button class="stop" onclick="stopPush()">3. СТОП</button>

    <script>
        let char;
        const TARGET_CHAR = "78667579-7b48-43db-b8c5-7928a6b0a335";
        
        // Повний список сервісів, щоб Chrome їх не фільтрував
        const ALL_POSSIBLE_SERVICES = [
            "0000ae00-0000-1000-8000-00805f9b34fb",
            "0000ae01-0000-1000-8000-00805f9b34fb",
            "0000fee9-0000-1000-8000-00805f9b34fb",
            "3d3cbc0e-f76b-11e3-8fcd-b2227cce2b54",
            "0000180a-0000-1000-8000-00805f9b34fb"
        ];

        const slider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedVal');
        const hexDisplay = document.getElementById('hexVal');

        slider.oninput = function() {
            speedDisplay.innerText = this.value;
            hexDisplay.innerText = "0x" + parseInt(this.value).toString(16).toUpperCase();
        };

        async function connect() {
            const status = document.getElementById('status');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ALL_POSSIBLE_SERVICES
                });

                status.innerText = "З'єднуюсь з " + device.name + "...";
                const server = await device.gatt.connect();
                
                status.innerText = "Сканую сервіси...";
                const services = await server.getPrimaryServices();
                
                for (let service of services) {
                    try {
                        const characteristics = await service.getCharacteristics();
                        const found = characteristics.find(c => c.uuid.toLowerCase() === TARGET_CHAR.toLowerCase());
                        if (found) {
                            char = found;
                            status.innerText = "✅ ГОТОВО! Знайшов у: " + service.uuid.substring(0,8);
                            return;
                        }
                    } catch (e) { continue; }
                }

                if (!char) throw new Error("Характеристика не знайдена. Перевір nRF Connect!");
            } catch (e) {
                status.innerText = "❌ Помилка: " + e.message;
            }
        }

        async function sendPush() {
            if (!char) return alert("Не підключено!");
            try {
                let val = parseInt(slider.value);
                await char.writeValue(new Uint8Array([0x0B, 0x08, val]));
            } catch (e) { alert("Збій: " + e.message); }
        }

        async function stopPush() {
            if (char) await char.writeValue(new Uint8Array([0x0B, 0x08, 0x00]));
        }
    </script>
</body>
</html>
