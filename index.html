<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ffcc; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #00ffcc; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        #disp { font-size: 32px; margin: 20px; color: #fff; background: #222; padding: 10px; }
        .log { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: PRECISION SCAN</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn" style="background:#0066ff; color:white" onclick="conn()">🔌 КОННЕКТ</button>
        
        <div id="disp">0</div>
        
        <button class="btn" style="background:#ff00ff; color:white" onclick="runScan(16)">🚀 ТОЧНИЙ СКАН (H11)</button>
        <button class="btn" style="background:red; color:white" onclick="stopScan()">🛑 СТОП</button>
        
        <div class="log">Крок: 1 | Пропускаємо: 8, 10</div>
    </div>

    <script>
        let d, ch, scanner;
        let val = 1;

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
            } catch (e) { alert(e); }
        }

        async function runScan(header) {
            if(!ch) return;
            val = 1;
            clearInterval(scanner);
            document.getElementById('st').innerText = "📡 ШУКАЮ (HEADER " + header + ")...";

            scanner = setInterval(async () => {
                if(val > 255) { stopScan(); return; }
                
                // Наш залізний ігнор
                if(val === 8 || val === 10) { val++; return; }

                document.getElementById('disp').innerText = val;
                
                try {
                    // Шлемо заголовок і точне значення
                    await ch.writeValueWithoutResponse(new Uint8Array([header, val]));
                } catch (e) {}
                
                val++; 
            }, 150); // 0.15 сек — досить швидко, але контролер встигне «продуплити»
        }

        function stopScan() {
            clearInterval(scanner);
            document.getElementById('st').innerText = "🛑 ЗУПИНЕНО НА " + (val - 1);
        }
    </script>
</body>
</html>
