<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #111; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .card { border: 2px solid #0f0; padding: 20px; border-radius: 15px; display: inline-block; background: #000; box-shadow: 0 0 15px #0f0; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; padding: 10px 20px; margin: 5px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:hover { background: #0f0; color: #000; }
        .slider { width: 100%; margin: 20px 0; accent-color: #0f0; }
        #st { color: #ff0; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>JIVE PC CONTROL</h3>
        <div id="st">СТАТУС: ТРЕБА ПІДКЛЮЧИТИСЬ</div>
        
        <button onclick="connect()">🔌 ПІДКЛЮЧИТИ JIVE</button>
        
        <div style="margin: 20px 0; border-top: 1px solid #333; padding-top: 10px;">
            <p>ВІБРАЦІЯ: <span id="vNum">0</span></p>
            <input type="range" min="0" max="255" value="0" class="slider" id="vS" oninput="send()">
        </div>

        <p>ТОЛКАЧКИ (РЕЖИМИ):</p>
        <div id="modes">
            <button onclick="setM(0)">OFF</button>
            <button onclick="setM(1)">Mode 1</button>
            <button onclick="setM(2)">Mode 2</button>
            <button onclick="setM(3)">Mode 3</button>
            <button onclick="setM(5)">Mode 5</button>
            <button onclick="setM(11)">Mode 11</button>
        </div>

        <br>
        <button style="border-color: red; color: red;" onclick="stopAll()">🛑 ТОРМОЗ</button>
    </div>

    <script>
        let ch;
        let curM = 0;

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await service.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО: " + device.name;
                // Примусовий стоп при підключенні, щоб не толкав одразу
                await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
            } catch (e) {
                alert("Помилка: " + e.message);
            }
        }

        async function setM(m) {
            curM = m;
            await send();
        }

        async function send() {
            if (!ch) return;
            let v = parseInt(document.getElementById('vS').value);
            document.getElementById('vNum').innerText = v;
            
            // Байт 2 - толкачки (твої графіки), Байт 3 - вібро (плавно)
            try {
                await ch.writeValueWithoutResponse(new Uint8Array([1, curM, v]));
            } catch (e) {}
        }

        async function stopAll() {
            if (!ch) return;
            curM = 0;
            document.getElementById('vS').value = 0;
            document.getElementById('vNum').innerText = 0;
            await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
        }
    </script>
</body>
</html>
