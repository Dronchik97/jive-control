<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 10px; }
        .card { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .btn { padding: 12px; background: #0088cc; border: none; border-radius: 8px; color: white; width: 100%; font-size: 16px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .stop-btn { background: #ff5252; }
        .scan-btn { background: #efa00b; color: black; }
        input[type=number] { width: 60px; padding: 8px; border-radius: 5px; border: none; text-align: center; }
        #log { background: #000; padding: 10px; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; text-align: left; border: 1px solid #444; }
        .current { font-size: 28px; color: #efa00b; margin: 10px 0; }
    </style>
</head>
<body>
    <button class="btn" onclick="connect()">🔌 1. ПІДКЛЮЧИТИСЬ</button>

    <div class="card">
        <h3>Налаштування сканера</h3>
        Заголовок (HEX): <input type="number" id="headerInp" value="1"> <br><br>
        Діапазон: від <input type="number" id="fromInp" value="0"> до <input type="number" id="toInp" value="20">
        <p>Пауза (сек): <input type="number" id="stepInp" value="2"></p>
        <button class="btn scan-btn" onclick="startCustomScan()">🚀 ЗАПУСТИТИ СКАН</button>
    </div>

    <div class="card">
        <div class="current" id="display">---</div>
        <button class="btn stop-btn" onclick="stopScan()">🛑 ЗУПИНИТИ (0x01, 0x00)</button>
    </div>

    <div class="card">
        <h3>Кілер-кнопки (тест вимкнення)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button class="btn stop-btn" onclick="sendMagic([0x01, 0x00])">1, 0</button>
            <button class="btn stop-btn" onclick="sendMagic([0x0B, 0x00])">11, 0</button>
            <button class="btn stop-btn" onclick="sendMagic([0x01, 0xFF])">1, 255</button>
            <button class="btn stop-btn" onclick="sendMagic([0x00, 0x00])">0, 0</button>
        </div>
    </div>

    <div id="log">Логи перебору...</div>

    <script>
        let characteristic;
        let scanInterval;
        const SERVICE_UUID = '78667579-7b48-43db-b8c5-7928a6b0a335';
        const CHAR_UUID    = '78667579-a914-49a4-8333-aa3c0cd8fedc';

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += "> " + msg + "<br>";
            l.scrollTop = l.scrollHeight;
        }

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                log("Підключено до: " + device.name);
            } catch (err) { log("Помилка: " + err); }
        }

        async function startCustomScan() {
            if (!characteristic) return alert("Коннект де?");
            stopScan();
            
            const head = parseInt(document.getElementById('headerInp').value);
            const from = parseInt(document.getElementById('fromInp').value);
            const to = parseInt(document.getElementById('toInp').value);
            const step = parseInt(document.getElementById('stepInp').value) * 1000;

            log("Скан заголовка " + head + " від " + from + " до " + to);
            
            let i = from;
            scanInterval = setInterval(async () => {
                if (i > to) {
                    stopScan();
                    log("Діапазон пройдено.");
                    return;
                }
                
                try {
                    await characteristic.writeValue(new Uint8Array([head, i]));
                    document.getElementById('display').innerText = head + ", " + i;
                    i++;
                } catch (e) { log("Збій на " + i); }
            }, step);
        }

        function stopScan() {
            clearInterval(scanInterval);
            sendMagic([0x01, 0x00]);
            document.getElementById('display').innerText = "STOP";
        }

        async function sendMagic(bytes) {
            if (!characteristic) return;
            try {
                await characteristic.writeValue(new Uint8Array(bytes));
                log("Send: " + bytes);
            } catch (e) { log("Err: " + e); }
        }
    </script>
</body>
</html>
