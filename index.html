<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #ff00ff; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #ff00ff; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .conn { background: #0066ff; color: #fff; }
        .start { background: #00ff00; color: #000; }
        #disp { font-size: 32px; margin: 20px; color: #fff; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: UNLOCK & SCAN</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn conn" onclick="conn()">🔌 1. КОННЕКТ</button>
        <div id="disp">READY</div>
        <button class="btn start" onclick="unlockAndRun()">🚀 РОЗБЛОКУВАТИ ТА СКАН</button>
        <button class="btn" style="background:red; color:#fff" onclick="stopScan()">🛑 СТОП</button>
    </div>

    <script>
        let d, ch, scanner;
        let val = 1;
        const blackList = [8, 10];

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
            } catch (e) { alert(e); }
        }

        async function unlockAndRun() {
            if(!ch) return;
            
            // 1. Шлемо "Handshake" (команда пробудження)
            try {
                await ch.writeValueWithoutResponse(new Uint8Array([0xff, 0xff, 0xff]));
                await new Promise(r => setTimeout(r, 200));
                await ch.writeValueWithoutResponse(new Uint8Array([0x01, 0x01, 0x01]));
            } catch(e) {}

            val = 1;
            clearInterval(scanner);
            document.getElementById('st').innerText = "📡 СКАН ПІСЛЯ UNLOCK";

            scanner = setInterval(async () => {
                if(val > 255) { stopScan(); return; }
                if(blackList.includes(val)) { val++; return; }

                document.getElementById('disp').innerText = val;
                try {
                    // Пробуємо стандартний Magic Motion пакет після розблокування
                    await ch.writeValueWithoutResponse(new Uint8Array([1, val, 1]));
                } catch (e) {}
                val++; 
            }, 150);
        }

        function stopScan() {
            clearInterval(scanner);
            document.getElementById('st').innerText = "🛑 СТОП";
        }
    </script>
</body>
</html>
