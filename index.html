<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .conn { background: #0066ff; color: #fff; }
        .scan { background: #ff00ff; color: #fff; }
        #disp { font-size: 24px; margin: 20px; color: #fff; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: MAGIC DECODER</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn conn" onclick="conn()">🔌 1. КОННЕКТ</button>
        
        <div id="disp">Чекаю...</div>
        
        <button class="btn scan" onclick="runScan(11)">🚀 СКАН HEADER 11</button>
        <button class="btn scan" onclick="runScan(255)">🚀 СКАН HEADER 255</button>
        
        <button class="btn" style="background:red; color:#fff" onclick="stopScan()">🛑 СТОП</button>
    </div>

    <script>
        let d, ch, scanner;
        let val = 1;
        const blackList = [8, 10];

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
            } catch (e) { alert(e); }
        }

        async function runScan(header) {
            if(!ch) return;
            val = 1;
            clearInterval(scanner);
            document.getElementById('st').innerText = "📡 ШУКАЮ В H" + header;

            scanner = setInterval(async () => {
                if(val > 255) { stopScan(); return; }
                if(blackList.includes(val)) { val++; return; }

                document.getElementById('disp').innerText = `[${header}, ${val}, 0, 1]`;
                
                try {
                    // Багатобайтовий пакет Magic Motion: [Header, Power, Mode, Control]
                    await ch.writeValueWithoutResponse(new Uint8Array([header, val, 0, 1]));
                } catch (e) {}

                val += 5; // Йдемо кроком 5, щоб швидше зачепити вібро
            }, 300); 
        }

        function stopScan() {
            clearInterval(scanner);
            document.getElementById('st').innerText = "🛑 ЗУПИНЕНО";
        }
    </script>
</body>
</html>
