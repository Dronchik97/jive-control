<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0e0e0e; color: #00ffcc; text-align: center; font-family: 'Courier New', monospace; padding: 20px; }
        .card { border: 2px solid #00ffcc; padding: 20px; border-radius: 20px; box-shadow: 0 0 20px #00ffcc33; }
        .btn { padding: 20px; margin: 10px 0; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .conn { background: #0088cc; color: white; }
        .fire { background: #ff00ff; color: white; font-size: 20px; animation: pulse 1s infinite; }
        .stop { background: #333; color: #888; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <h2>JIVE HACK: MUSIC MODE</h2>
        <div id="status" style="margin-bottom:10px;">🔴 NOT CONNECTED</div>
        <button class="btn conn" onclick="connect()">🔌 1. З'ЄДНАТИ</button>
        <button class="btn fire" onclick="startVibro()">🔥 2. ЗАПУСТИТИ ВІБРО</button>
        <button class="btn stop" onclick="stopVibro()">🛑 СТОП</button>
        <button class="btn stop" style="background:#ff5252; color:white;" onclick="kill()">🚫 ПОВНИЙ ВИКЛ</button>
    </div>

    <script>
        let device, char, loop;

        async function connect() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                char = await service.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('status').innerText = "🟢 СИСТЕМА ГОТОВА";
            } catch (e) { alert("Помилка Опери: " + e); }
        }

        async function startVibro() {
            if (!char) return;
            // Шлемо пачки кожні 20мс — це швидкість звуку (50 Гц)
            loop = setInterval(() => {
                // Шлемо команду "короткий тик" без очікування відповіді
                char.writeValueWithoutResponse(new Uint8Array([1, 1])); 
            }, 20);
            document.getElementById('status').innerText = "⚡ ГЕНЕРАЦІЯ ХВИЛІ...";
        }

        function stopVibro() {
            clearInterval(loop);
            if (char) char.writeValue(new Uint8Array([1, 0]));
            document.getElementById('status').innerText = "🟡 ПАУЗА";
        }

        async function kill() {
            stopVibro();
            if (device) await device.gatt.disconnect();
            document.getElementById('status').innerText = "🔴 ВІДКЛЮЧЕНО";
        }
    </script>
</body>
</html>
