<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; }
        .btn { padding: 15px; margin: 5px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .c { background: #0066ff; color: #fff; }
        .scan { background: #ff00ff; color: #fff; }
        .stop { background: #f00; color: #fff; }
        #log { font-size: 12px; text-align: left; background: #111; padding: 10px; height: 150px; overflow-y: scroll; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: VIBRO UNLOCKER</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn c" onclick="conn()">🔌 1. КОННЕКТ</button>
        
        <button class="btn scan" onclick="startScan()">🚀 ЗАПУСТИТИ СКАНУВАННЯ ВІБРО</button>
        <button class="btn stop" onclick="fullStop()">🛑 СТОП / RESET</button>

        <div id="log">Лог команд...</div>
    </div>

    <script>
        let d, c, scanIndex = 0;
        const log = document.getElementById('log');

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ГОТОВО";
            } catch (e) { alert(e); }
        }

        const variants = [
            { name: "3-байтовий (Channel 1, Vibe on Byte 2)", data: [1, 100, 0] },
            { name: "3-байтовий (Channel 1, Vibe on Byte 3)", data: [1, 0, 100] },
            { name: "Канал 3 (Vibro-only)", data: [3, 100] },
            { name: "Канал 4 (Vibro-only)", data: [4, 100] },
            { name: "Канал 7 (Custom Vibe)", data: [7, 100] },
            { name: "8-байтовий (Full structure)", data: [1, 0, 100, 0, 0, 0, 0, 0] },
            { name: "Handshake + Vibe", data: [0x55, 0x03, 1, 100] }
        ];

        async function startScan() {
            for (let v of variants) {
                log.innerHTML += `<div>Спроба: ${v.name}...</div>`;
                log.scrollTop = log.scrollHeight;
                
                try {
                    await c.writeValueWithoutResponse(new Uint8Array(v.data));
                    // Чекаємо 3 секунди, щоб ти зрозумів, чи воно запрацювало
                    await new Promise(r => setTimeout(r, 3000)); 
                    // Зупиняємо перед наступним тестом
                    await c.writeValueWithoutResponse(new Uint8Array([1, 0]));
                } catch (e) {}
            }
            log.innerHTML += `<div>--- СКАНУВАННЯ ЗАВЕРШЕНО ---</div>`;
        }

        async function fullStop() {
            if(c) await c.writeValueWithoutResponse(new Uint8Array([1, 0, 0, 0, 0, 0, 0, 0]));
            document.getElementById('st').innerText = "🛑 STOP";
        }
    </script>
</body>
</html>
