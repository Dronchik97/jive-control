<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ffcc; text-align: center; font-family: sans-serif; padding: 20px; }
        .panel { border: 2px solid #00ffcc; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .slider-box { margin: 20px 0; }
        input[type=range] { width: 100%; cursor: pointer; }
        .label { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; background: #0066ff; color: white; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: DOUBLE COMMAND</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn" onclick="conn()">🔌 1. КОННЕКТ</button>
        
        <div class="slider-box">
            <div class="label"><span>ТОЛКАЧКИ (Byte 2):</span> <span id="v1">0</span></div>
            <input type="range" min="0" max="255" value="0" id="s1" oninput="update()">
        </div>

        <div class="slider-box">
            <div class="label"><span>ВІБРАЦІЯ (Byte 3):</span> <span id="v2">0</span></div>
            <input type="range" min="0" max="255" value="0" id="s2" oninput="update()">
        </div>

        <button class="btn" style="background:red" onclick="stop()">🛑 ВСЕ ВИМКНУТИ</button>
    </div>

    <script>
        let ch;
        const blackList = [8, 10];

        async function conn() {
            try {
                const d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
                // Шлемо "Handshake"
                await ch.writeValueWithoutResponse(new Uint8Array([0xff, 0xff, 0xff]));
            } catch (e) { alert(e); }
        }

        async function update() {
            if(!ch) return;
            let val1 = parseInt(document.getElementById('s1').value);
            let val2 = parseInt(document.getElementById('s2').value);

            // Авто-ігнор 8 і 10
            if(blackList.includes(val1)) val1++;
            if(blackList.includes(val2)) val2++;

            document.getElementById('v1').innerText = val1;
            document.getElementById('v2').innerText = val2;

            try {
                // Шлемо пакет [Header, Thrust, Vibe]
                await ch.writeValueWithoutResponse(new Uint8Array([1, val1, val2]));
            } catch (e) {}
        }

        async function stop() {
            if(!ch) return;
            document.getElementById('s1').value = 0;
            document.getElementById('s2').value = 0;
            document.getElementById('v1').innerText = 0;
            document.getElementById('v2').innerText = 0;
            await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
        }
    </script>
</body>
</html>
