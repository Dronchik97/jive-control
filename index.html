<!DOCTYPE html>
<html>
<head>
    <title>Jive Control - Lovense Analog</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; display: inline-block; }
        .status { margin: 10px; padding: 10px; border-radius: 5px; font-weight: bold; }
        .active { background: #004400; border: 1px solid #0f0; }
        .inactive { background: #440000; border: 1px solid #f00; color: #f00; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>🦾 JIVE-CONTROL V1.0</h1>
        <p>Аналог Lovense для Андрія</p>
        
        <div id="btStatus" class="status inactive">БЛЮТУЗ: НЕМА КОНТАКТУ</div>
        <button onclick="connectBT()">🔌 ПІДКЛЮЧИТИ ІГРАШКУ</button>
        
        <div id="siteStatus" class="status inactive">САЙТ: ЧЕКАЮ СИГНАЛУ</div>
    </div>

    <script>
        let toyChar;

        async function connectBT() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                toyChar = await service.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                
                document.getElementById('btStatus').innerText = "БЛЮТУЗ: КОНТАКТ Є!";
                document.getElementById('btStatus').className = "status active";
                startListening();
            } catch(e) {
                alert("Помилка: " + e);
            }
        }

        function startListening() {
            document.getElementById('siteStatus').innerText = "САЙТ: СЛУХАЮ ТОКЕНИ...";
            document.getElementById('siteStatus').className = "status active";

            // Слухаємо команди від Lovense Extension або сайту
            window.addEventListener('message', function(event) {
                if (event.data && event.data.action === 'vibrate') {
                    let intensity = event.data.value; // зазвичай 0-20
                    sendToToy(intensity);
                }
            });
        }

        async function sendToToy(speed) {
            if (!toyChar) return;
            // Твоя команда: 0x00 (хедер), 0x08 (мотор), speed (0-20)
            let val = Math.min(Math.max(parseInt(speed), 0), 20); 
            await toyChar.writeValueWithoutResponse(new Uint8Array([0x00, 0x08, val]));
        }
    </script>
</body>
</html>
