<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Remote - Client View</title>
    <style>
        :root { --neon: #00ff41; --black: #0a0a0b; }
        body { background: transparent; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* КОРПУС ПУЛЬТА */
        .remote-case {
            width: 240px; height: 480px;
            background: linear-gradient(145deg, #1a1a1c, #020202);
            border-radius: 55px; border: 2px solid #222;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 15px rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 15px; position: relative;
        }

        /* Назва іграшки */
        .logo { font-size: 9px; letter-spacing: 5px; color: #444; margin-bottom: 30px; text-transform: uppercase; }

        /* СВІТЛОВЕ КОЛО (Реагує на вібрацію) */
        .led-circle {
            width: 90px; height: 90px; border-radius: 50%;
            background: #111; border: 3px solid #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 40px; position: relative; box-shadow: inset 0 0 10px #000;
        }

        #glow-effect {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: var(--neon); filter: blur(15px); opacity: 0; transition: opacity 0.1s;
        }

        .status-led { width: 10px; height: 10px; background: #222; border-radius: 50%; z-index: 2; transition: 0.3s; }
        .connected .status-led { background: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* ВЕРТИКАЛЬНА ШКАЛА */
        .vibe-bar {
            width: 6px; height: 140px; background: #000;
            border-radius: 10px; position: relative; border: 1px solid #1a1a1a; margin-bottom: 30px;
        }

        #vibe-level {
            width: 100%; height: 0%; background: var(--neon);
            position: absolute; bottom: 0; border-radius: 10px;
            box-shadow: 0 0 15px var(--neon); transition: height 0.1s;
        }

        /* ТЕХНІЧНА ІНФА */
        .info { font-size: 10px; color: #333; font-family: monospace; }

        /* ПРИХОВАНІ КНОПКИ (тільки для тебе, клієнт їх не бачить якщо підкрутиш стилі) */
        .actions { margin-top: 20px; width: 100%; }
        button { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #222; 
            color: #444; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 10px;
        }
        button:hover { color: var(--neon); border-color: var(--neon); }
    </style>
</head>
<body>

<div class="remote-case" id="toy">
    <div class="logo">REMOTE UNIT</div>

    <div class="led-circle">
        <div id="glow-effect"></div>
        <div class="status-led"></div>
    </div>

    <div class="vibe-bar">
        <div id="vibe-level"></div>
    </div>

    <div class="info" id="logText">SYSTEM READY</div>

    <div class="actions">
        <button onclick="connectBT()">BT CONNECT</button>
        <button onclick="startAudio()">MIC SYNC</button>
    </div>
</div>

<script src="remote.js"></script>

<script>
    // Хуки для оновлення дизайну
    const originalLog = addLog;
    addLog = (msg) => {
        if(originalLog) originalLog(msg);
        document.getElementById('logText').innerText = msg.toUpperCase();
        if (msg.includes("З'єднано") || msg.includes("готовий")) {
            document.getElementById('toy').classList.add('connected');
        }
    };

    // Цей код треба вставити в monitor() у твоєму remote.js:
    /*
    document.getElementById('vibe-level').style.height = (vol * 2.5) + "%";
    document.getElementById('glow-effect').style.opacity = vol / 40;
    */
</script>

</body>
</html>
