<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive-Control (Pult Mode)</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .pult { border: 3px solid #00ff41; padding: 25px; border-radius: 20px; display: inline-block; background: #111; box-shadow: 0 0 15px #00ff41; }
        #btStatus { margin: 10px; padding: 10px; border: 1px solid #333; border-radius: 5px; font-weight: bold; }
        .online { color: #00ff41; border-color: #00ff41; }
        .offline { color: #ff0000; border-color: #ff0000; }
        button { background: #00ff41; color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px 0; width: 100%; }
        #meter { width: 100%; height: 30px; background: #222; border: 1px solid #00ff41; margin: 20px 0; border-radius: 5px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: #00ff41; transition: width 0.05s; }
        .log { font-size: 11px; color: #666; text-align: left; height: 60px; overflow-y: auto; background: #050505; padding: 5px; }
    </style>
</head>
<body>

<div class="pult">
    <h1>🦾 JIVE-PULT V5</h1>
    <div id="btStatus" class="offline">СТАТУС: ВІДКЛЮЧЕНО</div>
    
    <button onclick="connectBT()">🔌 1. ЗАКОНЕКТИТИ ПУЛЬТ</button>
    <button onclick="startAudio()">🎤 2. СИНХРОНІЗАЦІЯ ЗІ ЗВУКОМ</button>
    
    <div id="meter"><div id="fill"></div></div>
    <div class="log" id="logBox">Чекаю на прозвонку...</div>
</div>

<script>
    let toyChar;
    let audioCtx, analyser, dataArr;
    let lastSpd = -1;

    function addLog(msg) {
        const box = document.getElementById('logBox');
        box.innerHTML += "<div>> " + msg + "</div>";
        box.scrollTop = box.scrollHeight;
    }

    async function connectBT() {
        try {
            addLog("Шукаю твою залізяку...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000fee9-0000-1000-8000-00805f9b34fb', // Твій стандартний сервіс
                    '78667579-7b48-43db-b8c5-7928a6b0a335'
                ]
            });
            const server = await device.gatt.connect();
            addLog("З'єднано з: " + device.name);

            const services = await server.getPrimaryServices();
            let service = services[0];
            const characteristics = await service.getCharacteristics();
            // Шукаємо характеристику для запису
            toyChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);
            
            if (toyChar) {
                document.getElementById('btStatus').innerText = "СТАТУС: ПІДКЛЮЧЕНО ✅";
                document.getElementById('btStatus').className = "offline online";
                addLog("Канал зв'язку готовий!");
            }
        } catch (err) {
            addLog("Помилка: " + err);
        }
    }

    async function startAudio() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArr = new Uint8Array(analyser.frequencyBinCount);
        addLog("Мікрофон слухає ефір...");
        monitor();
    }

    function monitor() {
        analyser.getByteFrequencyData(dataArr);
        let sum = 0;
        for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
        let vol = Math.round(sum / dataArr.length);
        
        document.getElementById('fill').style.width = Math.min(vol * 3, 100) + "%";
        
        if (vol > 20) {
            // Швидкість зазвичай 0-255 для таких плат
            let speed = Math.min(vol * 4, 255); 
            if (Math.abs(speed - lastSpd) > 5) {
                sendPultCommand(speed);
                lastSpd = speed;
            }
        } else if (lastSpd !== 0) {
            sendPultCommand(0);
            lastSpd = 0;
        }
        requestAnimationFrame(monitor);
    }

    async function sendPultCommand(s) {
        if (!toyChar) return;
        try {
            // ТІ САМІ БАЙТИ, ШО МИ ПИСАЛИ ДЛЯ ПУЛЬТА:
            // Часто це [0x55, 0x01, швидкість] або [0xFF, швидкість]
            // Шлемо комбінацію, яка працювала в нас у пульті:
            let data = new Uint8Array([0x55, 0x01, s]); 
            await toyChar.writeValueWithoutResponse(data);
        } catch (e) {
            console.log("Error");
        }
    }
</script>
</body>
</html>
