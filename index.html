<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 15px; }
        .btn { padding: 15px; background: #0088cc; border: none; border-radius: 8px; color: white; width: 100%; font-size: 16px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: #444; font-size: 14px; padding: 10px; border-radius: 5px; border: 1px solid #555; color: white; cursor: pointer; }
        .stop-btn { background: #ff5252; width: 100%; }
        input[type=range] { width: 100%; height: 40px; margin: 15px 0; }
        #status { padding: 10px; border-radius: 5px; background: #222; font-size: 13px; color: #00ff00; margin-bottom: 15px; }
        #console { text-align: left; background: #000; padding: 10px; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <h3>Magic Motion Debug Mode</h3>
    <div id="status">Статус: Готовий до пошуку</div>
    
    <!-- Кнопка тепер шукає ВСЕ пристрої -->
    <button class="btn" onclick="connect()">🔍 ШУКАТИ ПРИСТРОЇ</button>

    <p>Вібрація (0-10):</p>
    <input type="range" min="0" max="10" value="0" onchange="setVibe(this.value)">

    <div class="grid">
        <button class="mode-btn" onclick="sendMagic([0x05, 0x01])">Режим 1</button>
        <button class="mode-btn" onclick="sendMagic([0x05, 0x02])">Режим 2 (Толчки)</button>
    </div>

    <button class="btn stop-btn" onclick="setVibe(0)">🔴 СТОП</button>

    <div id="console">Логи: натисніть Пошук...</div>

    <script>
        let characteristic;
        // Твої UUID зі скрінів nRF Connect
        const SERVICE_UUID = '78667579-7b48-43db-b8c5-7928a6b0a335';
        const CHAR_UUID    = '78667579-a914-49a4-8333-aa3c0cd8fedc';

        function log(msg) {
            const c = document.getElementById('console');
            c.innerHTML += "> " + msg + "<br>";
            c.scrollTop = c.scrollHeight;
        }

        async function connect() {
            log("Запуск navigator.bluetooth...");
            try {
                // Використовуємо acceptAllDevices, щоб точно побачити твій CBT001
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });

                log("Пристрій вибрано: " + device.name);
                const server = await device.gatt.connect();
                log("GATT підключено");
                
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('status').innerText = "ПІДКЛЮЧЕНО ДО " + device.name;
                log("Успіх! Можна керувати.");
            } catch (err) {
                log("Помилка: " + err);
                // Якщо пише "User cancelled", значить ти просто закрив вікно вибору
            }
        }

        async function sendMagic(bytes) {
            if (!characteristic) return log("Спочатку підключіться!");
            try {
                const data = new Uint8Array(bytes);
                await characteristic.writeValue(data);
                log("Надіслано: " + bytes.join(', '));
            } catch (err) {
                log("Збій запису: " + err);
            }
        }

        function setVibe(val) {
            sendMagic([0x01, parseInt(val)]);
        }
    </script>
</body>
</html>
