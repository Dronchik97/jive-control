<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Consolas', monospace; text-align: center; padding: 20px; }
        .console { border: 1px solid #00ff00; background: #000; padding: 15px; height: 200px; overflow-y: scroll; text-align: left; font-size: 12px; margin-bottom: 10px; }
        button { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin: 5px; cursor: pointer; width: 180px; }
        button:hover { background: #00ff00; color: #000; }
        .active { background: #ff00ff; border-color: #ff00ff; color: #fff; }
    </style>
</head>
<body>
    <h3>JIVE DEEP ANALYZER</h3>
    <div class="console" id="log">ПОЧАТОК РОБОТИ... ЧЕКАЮ КОННЕКТ</div>
    
    <button onclick="conn()">🔌 1. КОННЕКТ</button>
    <hr style="border-color: #222">
    
    <p>СПЕЦІАЛЬНІ ПАКЕТИ (для Jive):</p>
    <button onclick="sendSet(1, 100, 5)">📦 TEST 5-BYTE (H1)</button>
    <button onclick="sendSet(11, 100, 3)">📦 TEST 3-BYTE (H11)</button>
    <button onclick="sendSet(16, 100, 3)">📦 TEST 3-BYTE (H16)</button>
    
    <p>АВТО-СКАНЕР (ПЕРЕБІР):</p>
    <button id="scanBtn" onclick="toggleScan()" style="background: #200; border-color: red;">🔍 ЗАПУСТИТИ СКАН</button>
    
    <br><br>
    <button onclick="stopAll()" style="color: red; border-color: red;">🛑 TOTAL STOP</button>

    <script>
        let ch, scanner;
        let sVal = 0;
        const l = document.getElementById('log');

        function log(msg) {
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function conn() {
            try {
                const d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                log("ГАТТ ПІДКЛЮЧЕНО: " + d.name);
            } catch (e) { log("ПОМИЛКА: " + e.message); }
        }

        async function sendSet(h, v, len) {
            if (!ch) return log("СПОЧАТКУ КОННЕКТ!");
            let arr;
            if (len === 5) arr = new Uint8Array([h, 1, v, 0, 0]); // 5-байтовий формат
            else arr = new Uint8Array([h, 1, v]); // 3-байтовий формат
            
            log(`ШЛЮ: [${arr.join(', ')}]`);
            try { await ch.writeValueWithoutResponse(arr); } catch(e) {}
        }

        function toggleScan() {
            if (scanner) {
                clearInterval(scanner);
                scanner = null;
                log("СКАНЕР ЗУПИНЕНО");
                document.getElementById('scanBtn').classList.remove('active');
            } else {
                sVal = 0;
                document.getElementById('scanBtn').classList.add('active');
                log("СТАРТ ПЕРЕБОРУ...");
                scanner = setInterval(async () => {
                    if (sVal > 255) { toggleScan(); return; }
                    log("ПРОБА SPEED: " + sVal);
                    try {
                        // Шлемо комбо на різних заголовках одночасно
                        await ch.writeValueWithoutResponse(new Uint8Array([1, 1, sVal]));
                        await new Promise(r => setTimeout(r, 50));
                        await ch.writeValueWithoutResponse(new Uint8Array([11, 1, sVal]));
                    } catch(e) {}
                    sVal += 5;
                }, 300);
            }
        }

        async function stopAll() {
            if (scanner) toggleScan();
            if (ch) await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
            log("ВСЕ ВИМКНЕНО");
        }
    </script>
</body>
</html>
