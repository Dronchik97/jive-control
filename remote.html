<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Remote | Global</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .pult { max-width: 400px; margin: auto; background: #161b22; padding: 40px; border-radius: 50px; border: 2px solid #00ff41; }
        .slider { width: 100%; height: 15px; background: #000; border-radius: 10px; -webkit-appearance: none; margin: 40px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 40px; height: 40px; background: #00ff41; border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px #00ff41; }
        .btn-stop { background: #ff4141; color: #000; border: none; padding: 20px; width: 100%; border-radius: 20px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #val { font-size: 40px; color: #00ff41; font-weight: bold; }
    </style>
</head>
<body>
    <div class="pult">
        <h2>JIVE REMOTE</h2>
        <div id="val">0%</div>
        <input type="range" min="0" max="255" value="0" class="slider" oninput="sendSpeed(this.value)">
        <button class="btn-stop" onclick="sendSpeed(0)">STOP</button>
        <div id="status" style="margin-top:20px; font-size:10px; color:#444;">CONNECTING TO CLOUD...</div>
    </div>

    <script>
        const TOPIC = "andrii_jive_vibe_999";
        const client = mqtt.connect('wss://test.mosquitto.org:8081');

        client.on('connect', () => {
            document.getElementById('status').innerText = "CONNECTED TO SERVER";
        });

        function sendSpeed(val) {
            document.getElementById('val').innerText = Math.round((val/255)*100) + "%";
            client.publish(TOPIC, val.toString());
        }
    </script>
</body>
</html>
