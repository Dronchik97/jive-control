<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .btn { padding: 20px; background: #4caf50; border: none; border-radius: 12px; color: white; width: 100%; font-size: 20px; cursor: pointer; }
        #status { color: #ffeb3b; margin-top: 20px; font-family: monospace; font-size: 14px; text-align: left; background: #000; padding: 10px; }
        input[type=range] { width: 100%; height: 60px; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>Funtown Jive Debug Mode</h3>
    <button class="btn" onclick="connect()">🔍 СКАНУВАТИ ТА ПІДКЛЮЧИТИ</button>
    <input type="range" min="0" max="100" value="0" oninput="sendSpeed(this.value)">
    <div id="status">Лог подій...</div>

    <script>
        let characteristic;

        async function log(msg) {
            document.getElementById('status').innerText += "\n> " + msg;
        }

        async function connect() {
            try {
                log("Шукаю пристрій...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });

                log("Підключення до " + device.name);
                const server = await device.gatt.connect();
                
                log("Отримую список сервісів...");
                const services = await server.getPrimaryServices();
                
                for (let service of services) {
                    log("Знайдено сервіс: " + service.uuid);
                    const chars = await service.getCharacteristics();
                    for (let char of chars) {
                        log("--- Характеристика: " + char.uuid);
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            characteristic = char;
                            log("✅ ВИБРАНО ДЛЯ ЗАПИСУ!");
                        }
                    }
                }
                
                if (characteristic) {
                    log("🎉 ГОТОВО! Пробуй повзунок.");
                } else {
                    log("❌ Не знайдено портів для запису.");
                }
            } catch (e) {
                log("🚨 Помилка: " + e.message);
            }
        }

        async function sendSpeed(val) {
            if (!characteristic) return;
            try {
                // Відправляємо 0x0b (Magic Motion) або 0x01 (простий протокол)
                const data = new Uint8Array([0x0b, parseInt(val), 0x00, 0x00, 0x00]);
                await characteristic.writeValue(data);
            } catch (e) {}
        }
    </script>
</body>
</html>
