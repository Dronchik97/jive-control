<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Control - Start Link</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .connect-btn { 
            background: transparent; color: #00ff41; border: 3px solid #00ff41; 
            padding: 25px 50px; font-size: 22px; cursor: pointer; border-radius: 60px;
            text-transform: uppercase; letter-spacing: 3px; font-weight: bold;
            transition: 0.3s; box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        .connect-btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 40px #00ff41; }
    </style>
</head>
<body>

    <button class="connect-btn" onclick="connectAndGo()">Connect Bluetooth</button>

    <script>
        async function connectAndGo() {
            try {
                // Викликаємо вікно вибору пристрою
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb']
                });
                
                // Якщо пристрій вибрано, зберігаємо його ID (або просто переходимо)
                // Оскільки Bluetooth-об'єкт не можна просто передати між сторінками, 
                // ми переходимо на remote.html, де вже будемо працювати.
                
                window.location.href = 'remote.html';
            } catch (e) {
                alert("Помилка підключення: " + e);
            }
        }
    </script>
</body>
</html>
