<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 10px; margin: 0; }
        .container { display: flex; justify-content: space-around; padding-top: 15px; }
        .box { width: 45%; display: flex; flex-direction: column; align-items: center; }
        input[type=range][orient=vertical] { appearance: slider-vertical; width: 70px; height: 320px; cursor: pointer; }
        .val { font-size: 26px; margin-top: 10px; font-weight: bold; }
        
        .header-ui { background: #111; padding: 15px; border-bottom: 2px solid #333; margin-bottom: 10px; }
        input[type=text] { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 70%; text-align: center; font-size: 16px; margin-bottom: 10px; }
        
        button { background: #0f0; color: #000; border: none; padding: 12px; width: 80%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-stop { background: #ff0000; color: #fff; width: 90%; padding: 20px; font-size: 20px; margin-top: 25px; border-radius: 10px; }
        
        #status { font-size: 12px; margin: 10px 0; color: #888; }
    </style>
</head>
<body>

    <div class="header-ui">
        <input type="text" id="peer-id" placeholder="Введіть ID">
        <button onclick="connectToHost()">🔗 ПІДКЛЮЧИТИСЬ</button>
        <div id="status">Статус: Очікування...</div>
    </div>

    <div class="container">
        <div class="box">
            <div style="color:#00ffff; font-size: 12px;">📳 VIBRO</div>
            <input type="range" id="vSlider" min="0" max="29" value="0" orient="vertical">
            <div id="vVal" class="val" style="color:#00ffff">0</div>
        </div>
        <div class="box">
            <div style="color:#ffff00; font-size: 12px;">🚀 PUSHER</div>
            <input type="range" id="pSlider" min="0" max="100" value="0" orient="vertical">
            <div id="pVal" class="val" style="color:#ffff00">0</div>
        </div>
    </div>

    <button class="btn-stop" onclick="stopRemote()">🛑 STOP ALL</button>

    <script>
        let conn;
        const peer = new Peer();

        function connectToHost() {
            const id = document.getElementById('peer-id').value;
            conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('status').innerText = "✅ ЗВ'ЯЗОК Є!";
                document.getElementById('status').style.color = "#0f0";
            });
        }

        // Відправка вібро (Long)
        document.getElementById('vSlider').oninput = function() {
            let v = parseInt(this.value);
            let finalV = (v > 0 && v < 6) ? 6 : v;
            document.getElementById('vVal').innerText = finalV;
            if (conn && conn.open) conn.send({type: 'v', val: finalV});
        };

        // Відправка толкачки (Short)
        document.getElementById('pSlider').oninput = function() {
            let v = parseInt(this.value);
            let finalV = (v > 0 && v < 32) ? 32 : v;
            document.getElementById('pVal').innerText = finalV;
            if (conn && conn.open) conn.send({type: 'p', val: finalV});
        };

        // Функція повної зупинки
        function stopRemote() {
            document.getElementById('vSlider').value = 0;
            document.getElementById('pSlider').value = 0;
            document.getElementById('vVal').innerText = "0";
            document.getElementById('pVal').innerText = "0";
            
            if (conn && conn.open) {
                // Шлемо команди зупинки для обох типів пакетів
                conn.send({type: 'v', val: 0});
                setTimeout(() => {
                    conn.send({type: 'p', val: 0});
                }, 50);
            }
        }
    </script>
</body>
</html>
