<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 15px; }
        .btn { padding: 15px; background: #0088cc; border: none; border-radius: 8px; color: white; width: 100%; font-size: 16px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .scan-btn { background: #efa00b; color: black; }
        .stop-btn { background: #ff5252; }
        #status { padding: 10px; border-radius: 5px; background: #222; font-size: 14px; color: #0ff; margin-bottom: 10px; }
        #log { background: #000; padding: 10px; font-family: monospace; font-size: 12px; height: 150px; overflow-y: auto; text-align: left; border: 1px solid #333; }
        .current-val { font-size: 24px; color: #efa00b; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Jive: Авто-Сканер Команд</h3>
    <div id="status">Статус: Підключіться</div>
    
    <button class="btn" onclick="connect()">🔌 1. ПІДКЛЮЧИТИСЬ</button>
    
    <div class="current-val" id="display">Команда: ---</div>

    <div style="display: flex; gap: 10px;">
        <button class="btn scan-btn" onclick="startScan(0x01)">Сканувати 0x01</button>
        <button class="btn scan-btn" onclick="startScan(0x0B)">Сканувати 0x0B</button>
    </div>

    <button class="btn stop-btn" onclick="stopScan()">🛑 ЗУПИНИТИ СКАНЕР</button>

    <div id="log">Логи перебору...</div>

    <script>
        let characteristic;
        let scanInterval;
        const SERVICE_UUID = '78667579-7b48-43db-b8c5-7928a6b0a335';
        const CHAR_UUID    = '78667579-a914-49a4-8333-aa3c0cd8fedc';

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += "> " + msg + "<br>";
            l.scrollTop = l.scrollHeight;
        }

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                document.getElementById('status').innerText = "ПІДКЛЮЧЕНО ✅";
                log("Готово до сканування.");
            } catch (err) { log("Помилка: " + err); }
        }

        async function startScan(header) {
            if (!characteristic) return alert("Спочатку коннект!");
            stopScan();
            log("Запуск сканування заголовка " + header + "...");
            
            let i = 0;
            scanInterval = setInterval(async () => {
                if (i > 20) {
                    stopScan();
                    log("Сканування завершено.");
                    return;
                }
                
                try {
                    const data = new Uint8Array([header, i]);
                    await characteristic.writeValue(data);
                    document.getElementById('display').innerText = "Команда: [" + header + ", " + i + "]";
                    log("Спроба: " + header + ", " + i);
                    i++;
                } catch (e) { console.log(e); }
            }, 2000); // Кожні 2 секунди нова команда, щоб ти встиг відчути
        }

        function stopScan() {
            clearInterval(scanInterval);
            if (characteristic) characteristic.writeValue(new Uint8Array([0x01, 0x00]));
            document.getElementById('display').innerText = "ЗУПИНЕНО";
        }
    </script>
</body>
</html>
