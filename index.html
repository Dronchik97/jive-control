<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ffcc; text-align: center; font-family: sans-serif; padding: 20px; }
        .panel { border: 2px solid #00ffcc; padding: 20px; border-radius: 15px; background: #0a0a0a; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 5px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .c { background: #0088cc; color: #fff; }
        .vibe { background: #ff00ff; color: #fff; }
        .stop { background: #cc0000; color: #fff; }
        .slider-group { margin: 20px 0; border: 1px solid #333; padding: 10px; border-radius: 10px; }
        input[type=range] { width: 100%; height: 30px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: КОНТРОЛЬ МОТОРІВ</h3>
        <div id="st">🔴 СТАТУС: OFF</div>
        <button class="btn c" onclick="conn()">🔌 1. КОННЕКТ</button>

        <div class="slider-group">
            <label>ТОЛКАЧКИ (Заголовок 1): <span id="tV">0</span></label>
            <input type="range" min="0" max="255" value="0" id="tS" oninput="update()">
        </div>

        <div class="slider-group" style="border-color: #ff00ff;">
            <label>ВІБРО (Заголовок 2): <span id="vV">0</span></label>
            <input type="range" min="0" max="255" value="0" id="vS" oninput="updateVibe()">
        </div>

        <button class="btn vibe" onclick="send([1, parseInt(tS.value), 255])">ТЕСТ: 3 БАЙТИ (Комбо)</button>
        <button class="btn stop" onclick="stop()">🛑 ВИМКНУТИ ВСЕ</button>
    </div>

    <script>
        let d, c;
        const tS = document.getElementById('tS'), vS = document.getElementById('vS');
        
        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
            } catch (e) { alert(e); }
        }

        // Керування толкачками (те, що ми вже знаємо)
        function update() {
            document.getElementById('tV').innerText = tS.value;
            send([1, parseInt(tS.value)]); 
        }

        // Шукаємо вібро через заголовок 2
        function updateVibe() {
            document.getElementById('vV').innerText = vS.value;
            send([2, parseInt(vS.value)]); 
        }

        async function send(arr) {
            if (!c) return;
            try {
                await c.writeValueWithoutResponse(new Uint8Array(arr));
            } catch (e) {}
        }

        function stop() {
            if(c) {
                send([1, 0]);
                send([2, 0]);
            }
        }
    </script>
</body>
</html>
