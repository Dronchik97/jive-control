<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JIVE HACKER PRO</title>
    <style>
        body { background: #050505; color: #00ff00; text-align: center; font-family: 'Courier New', monospace; padding: 10px; }
        .panel { border: 2px solid #00ff00; padding: 15px; border-radius: 15px; background: #001100; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 5px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .conn { background: #0044ff; color: white; box-shadow: 0 0 10px #0044ff; }
        .mode-a { background: #ff00ff; color: white; }
        .mode-b { background: #ffaa00; color: black; }
        .stop { background: #aa0000; color: white; }
        .status { font-size: 12px; margin-bottom: 10px; color: #88ff88; }
        .group { border: 1px solid #333; padding: 10px; margin: 10px 0; border-radius: 5px; }
        input[type=range] { width: 90%; }
    </style>
</head>
<body>

<div class="panel">
    <h3>JIVE ULTIMATE CONTROL</h3>
    <div id="st" class="status">СТАТУС: ВІДКЛЮЧЕНО</div>
    
    <button class="btn conn" onclick="connect()">🔌 ПІДКЛЮЧИТИСЬ (Chrome/Edge)</button>

    <div class="group">
        <div>ПОТУЖНІСТЬ: <span id="pV">100</span></div>
        <input type="range" min="0" max="255" value="100" id="pwr" oninput="document.getElementById('pV').innerText=this.value">
    </div>

    <div class="group">
        <small>МЕТОД "КУЛЕМЕТ" (Швидкі імпульси)</small>
        <button class="btn mode-a" onclick="startRapid()">🔥 ЗАПУСТИТИ ПОТІК</button>
    </div>

    <div class="group">
        <small>СПЕЦ-ПАКЕТИ (Шукаємо вібро-код)</small>
        <button class="btn mode-b" onclick="sendPkg([255, 1, getP()])">ВАРІАНТ А (FF 01 XX)</button>
        <button class="btn mode-b" onclick="sendPkg([1, 1, getP()])">ВАРІАНТ Б (01 01 XX)</button>
        <button class="btn mode-b" onclick="sendPkg([1, getP(), getP()+1])">ВАРІАНТ В (SUM)</button>
        <button class="btn mode-b" onclick="sendPkg([1, getP(), 0, 0, 0, 0, 0, 0])">ВАРІАНТ Г (8 BYTES)</button>
    </div>

    <button class="btn stop" onclick="stopAll()">🛑 СТОП / ВИМКНУТИ</button>
</div>

<script>
    let device, char, loop;

    function getP() { return parseInt(document.getElementById('pwr').value); }

    async function connect() {
        try {
            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
            char = await service.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
            document.getElementById('st').innerText = "СТАТУС: ONLINE (ЗНАЙДЕНО " + char.uuid.slice(-4) + ")";
        } catch (e) { 
            document.getElementById('st').innerText = "ПОМИЛКА: " + e.message;
        }
    }

    async function sendPkg(arr) {
        if (!char) return;
        try {
            // Пробуємо записати пакет
            await char.writeValueWithoutResponse(new Uint8Array(arr));
            console.log("Sent:", arr);
        } catch (e) { console.log("Err:", e); }
    }

   function startVibroWave() {
    let level = 120; // Початкова потужність
    clearInterval(loop);
    
    loop = setInterval(() => {
        if (!char) return;
        
        // Створюємо "хитання" потужності (синусоїду)
        // Це змушує мотор не зупинятися, бо сигнал весь час різний
        let wave = level + Math.floor(Math.random() * 20); 
        
        // Шлемо заголовок 1 (мотор) і наше динамічне значення
        char.writeValueWithoutResponse(new Uint8Array([1, wave]));
        
    }, 15); // Дуже висока швидкість - 15 мілісекунд
}
    
    function stopAll() {
        clearInterval(loop);
        if(char) char.writeValue(new Uint8Array([1, 0]));
        document.getElementById('st').innerText = "СТАТУС: ПАУЗА / СТОП";
    }
</script>

</body>
</html>
