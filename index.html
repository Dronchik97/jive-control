<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive-Control V6.0 (Double Protocol)</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .pult { border: 3px solid #00ff41; padding: 25px; border-radius: 20px; display: inline-block; background: #111; box-shadow: 0 0 15px #00ff41; width: 90%; max-width: 400px; }
        #btStatus { margin: 10px; padding: 10px; border: 1px solid #333; border-radius: 5px; font-weight: bold; }
        .online { color: #00ff41; border-color: #00ff41; background: #002200; }
        .offline { color: #ff0000; border-color: #ff0000; background: #220000; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px 0; width: 100%; font-size: 16px; }
        #meter { width: 100%; height: 30px; background: #222; border: 1px solid #00ff41; margin: 20px 0; border-radius: 5px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: #00ff41; transition: width 0.05s; }
        .log { font-size: 11px; color: #666; text-align: left; height: 80px; overflow-y: auto; background: #050505; padding: 8px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="pult">
    <h1>🦾 JIVE-CONTROL V6</h1>
    <div id="btStatus" class="status-box offline">СТАТУС: ВІДКЛЮЧЕНО 🔴</div>
    
    <button onclick="connectBT()">🔌 1. ПІДКЛЮЧИТИ ПЛАТУ</button>
    <button onclick="startAudio()">🎤 2. СЛУХАТИ МІКРОФОН</button>
    
    <div id="meter"><div id="fill"></div></div>
    <div class="log" id="logBox">Система готова. Чекаю на старт...</div>
</div>

<script>
    let toyChar;
    let audioCtx, analyser, dataArr;
    let lastSpd = -1;

    function addLog(msg) {
        const box = document.getElementById('logBox');
        box.innerHTML += "<div>> " + msg + "</div>";
        box.scrollTop = box.scrollHeight;
    }

    async function connectBT() {
        try {
            addLog("Шукаю пристрій...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb', '78667579-7b48-43db-b8c5-7928a6b0a335']
            });
            const server = await device.gatt.connect();
            addLog("З'єднано з: " + device.name);

            const services = await server.getPrimaryServices();
            let service = services[0];
            const characteristics = await service.getCharacteristics();
            toyChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);
            
            if (toyChar) {
                document.getElementById('btStatus').innerText = "СТАТУС: ПІДКЛЮЧЕНО ✅";
                document.getElementById('btStatus').className = "status-box online";
                addLog("Канал знайдено. Можна газувати!");
            }
        } catch (err) {
            addLog("Помилка BT: " + err);
        }
    }

    async function startAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArr = new Uint8Array(analyser.frequencyBinCount);
            addLog("Мікрофон під напругою...");
            monitor();
        } catch(e) {
            addLog("Нема доступу до міка!");
        }
    }

    function monitor() {
        analyser.getByteFrequencyData(dataArr);
        let sum = 0;
        for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
        let vol = Math.round(sum / dataArr.length);
        
        document.getElementById('fill').style.width = Math.min(vol * 3, 100) + "%";
        
        if (vol > 15) {
            let speed = Math.min(vol * 4, 255); 
            if (Math.abs(speed - lastSpd) > 10) {
                sendCommands(speed);
                lastSpd = speed;
            }
        } else if (lastSpd !== 0) {
            sendCommands(0);
            lastSpd = 0;
        }
        requestAnimationFrame(monitor);
    }

    async function sendCommands(s) {
        if (!toyChar) return;
        try {
            // Шлемо обидва варіанти по черзі:
            // Варіант 1 (0x55)
            await toyChar.writeValueWithoutResponse(new Uint8Array([0x55, 0x01, s]));
            // Варіант 2 (0xFF)
            await toyChar.writeValueWithoutResponse(new Uint8Array([0xFF, s]));
        } catch (e) {
            console.log("Error");
        }
    }
</script>
</body>
</html>
