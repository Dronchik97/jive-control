<!DOCTYPE html>
<html>
<head>
    <title>Andrii Pusher Final Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        button { padding: 20px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #27ae60; color: white; margin: 10px; width: 90%; }
        #status { color: #f1c40f; margin: 15px; border: 1px solid #333; padding: 10px; font-size: 14px; text-align: left; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>Пульт для Андрія 🚀</h2>
    <div id="status">Статус: Тисни ПІДКЛЮЧИТИСЬ</div>
    
    <button onclick="connect()">1. ПІДКЛЮЧИТИСЬ</button>
    <br>
    <input type="range" id="speedRange" min="0" max="255" value="180" style="width:80%">
    <p>Швидкість: <span id="speedVal">180</span></p>
    
    <button onclick="sendCommand()">2. ЗАПУСТИТИ</button>
    <button style="background:#c0392b" onclick="stopDevice()">3. СТОП</button>

    <script>
        let characteristic;
        const TARGET_CHAR = "78667579-7b48-43db-b8c5-7928a6b0a335";

        document.getElementById('speedRange').oninput = function() {
            document.getElementById('speedVal').innerText = this.value;
        };

        async function connect() {
            const status = document.getElementById('status');
            try {
                status.innerText = "Вибирай пристрій...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    // Додаємо ВСІ можливі сервіси, які можуть ховати нашу характеристику
                    optionalServices: [
                        "0000ae00-0000-1000-8000-00805f9b34fb",
                        "0000ae01-0000-1000-8000-00805f9b34fb",
                        "0000fee9-0000-1000-8000-00805f9b34fb",
                        "3d3cbc0e-f76b-11e3-8fcd-b2227cce2b54",
                        "0000180a-0000-1000-8000-00805f9b34fb"
                    ]
                });

                status.innerText = "З'єднуюсь...";
                const server = await device.gatt.connect();
                
                status.innerText = "Сканую сервіси...";
                const services = await server.getPrimaryServices();
                
                status.innerText = "Знайдено сервісів: " + services.length + "\nШукаю потрібну характеристику...";

                for (const service of services) {
                    console.log("Дивлюсь сервіс:", service.uuid);
                    try {
                        const chars = await service.getCharacteristics();
                        for (const c of chars) {
                            if (c.uuid.toLowerCase() === TARGET_CHAR.toLowerCase()) {
                                characteristic = c;
                                status.innerText = "ЗНАЙШОВ! ✅\nСервіс: " + service.uuid + "\nМожна лупити!";
                                return;
                            }
                        }
                    } catch (e) { continue; }
                }

                if (!characteristic) {
                    status.innerText = "❌ Збій: Характеристика не знайдена.\nСпробуй ще раз, або іграшка заснула.";
                }
            } catch (error) {
                status.innerText = "❌ Помилка: " + error.message;
            }
        }

        async function sendCommand() {
            if (!characteristic) return alert("Спочатку підключись!");
            try {
                let speed = parseInt(document.getElementById('speedRange').value);
                await characteristic.writeValue(new Uint8Array([0x0B, 0x08, speed]));
            } catch (e) { alert("Помилка запису: " + e.message); }
        }

        async function stopDevice() {
            if (characteristic) await characteristic.writeValue(new Uint8Array([0x0B, 0x08, 0x00]));
        }
    </script>
</body>
</html>
