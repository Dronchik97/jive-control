<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 10px; }
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 15px; margin: 5px; width: 140px; cursor: pointer; font-size: 12px; border-radius: 5px; }
        button:active { background: #0f0; color: #000; }
        .group { border: 1px solid #333; margin: 15px 0; padding: 15px; border-radius: 10px; }
        input[type=range] { width: 90%; height: 60px; margin: 20px 0; cursor: pointer; accent-color: #0f0; }
        .status-box { font-size: 12px; color: #666; margin: 10px; padding: 5px; border: 1px solid #222; min-height: 20px; }
        h2 { color: #0f0; text-shadow: 0 0 5px #0f0; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>PUSHER LIVE v5.1</h2>
    
    <button onclick="conn()" style="width: 100%; max-width: 310px; border-width: 3px;">🔌 CONNECT</button>
    <button onclick="hardDisconnect()" style="width: 100%; max-width: 310px; border-color: #f0f; color: #f0f;">🚫 FORCE DISCONNECT</button>
    
    <div id="out" class="status-box">Disconnected</div>

    <div class="group" style="border-color: #0f0;">
        <p style="font-weight: bold;">🎮 LIVE CONTROL (11, 8, V)</p>
        <button onclick="test([11, 8, 32])" style="width: 100%; max-width: 280px; background: #050;">▶️ ПУСК (0x20)</button>
        <input type="range" id="pusherSlider" min="32" max="100" value="64">
        <div style="font-size: 20px; margin-top: 10px;">
            Power: <span id="pVal">64</span> (Hex: <span id="hVal">0x40</span>)
        </div>
    </div>

    <button onclick="stop()" style="color:red; border-color:red; width: 100%; max-width: 310px; font-weight: bold; font-size: 20px;">🛑 STOP</button>

    <script>
        let device, ch;
        const slider = document.getElementById('pusherSlider');
        const pVal = document.getElementById('pVal');
        const hVal = document.getElementById('hVal');
        const out = document.getElementById('out');

        slider.oninput = async function() {
            let speed = parseInt(this.value);
            pVal.innerText = speed;
            hVal.innerText = "0x" + speed.toString(16).toUpperCase();
            
            if (ch) {
                try {
                    await ch.writeValueWithoutResponse(new Uint8Array([11, 8, speed]));
                } catch (e) { console.log("Too fast..."); }
            }
        };

        async function conn() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await device.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                out.innerText = "✅ Connected!";
            } catch (e) {
                out.innerText = "❌ Error: " + e.message;
            }
        }

        async function hardDisconnect() {
            if (device && device.gatt.connected) {
                out.innerText = "Killing connection...";
                await device.gatt.disconnect();
            }
            // Жорсткий рефреш сторінки, шоб очистити Bluetooth стек браузера
            setTimeout(() => { window.location.reload(); }, 500);
        }

        async function test(arr) {
            if (!ch) return;
            await ch.writeValueWithoutResponse(new Uint8Array(arr));
            out.innerText = "Sent: " + arr;
        }

        async function stop() {
            if (ch) await ch.writeValueWithoutResponse(new Uint8Array([11, 8, 0]));
            out.innerText = "🛑 Stopped";
        }
    </script>
</body>
</html>
