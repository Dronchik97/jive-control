<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 5px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .c { background: #0066ff; color: #fff; }
        .v { background: #ff00ff; color: #fff; }
        .s { background: #f00; color: #fff; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: ANTI-PROTECTION UNIT</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn c" onclick="conn()">🔌 1. КОННЕКТ</button>

        <hr>
        <p>Плавний пуск вібро (Заголовок 2):</p>
        <button class="btn v" onclick="softStart(2)">🚀 ПЛАВНИЙ ПУСК (Ch 2)</button>
        <button class="btn v" onclick="softStart(5)">🚀 ПЛАВНИЙ ПУСК (Ch 5)</button>
        
        <hr>
        <button class="btn s" onclick="fullStop()">🛑 СТОП / RESET</button>
    </div>

    <script>
        let d, c, testLoop;

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 READY";
            } catch (e) { alert(e); }
        }

        async function softStart(header) {
            clearInterval(testLoop);
            document.getElementById('st').innerText = "⚡ ПУСК КАНАЛУ " + header;
            let val = 0;
            
            testLoop = setInterval(async () => {
                if(val > 255) { clearInterval(testLoop); return; }
                
                try {
                    // Шлемо довгий пакет, щоб стабілізувати контролер
                    await c.writeValueWithoutResponse(new Uint8Array([header, val, 0, 0, 0, 0, 0, 0]));
                    val += 5; // Піднімаємо дуже плавно
                    console.log("Header " + header + " Power: " + val);
                } catch (e) {}
            }, 100); 
        }

        async function fullStop() {
            clearInterval(testLoop);
            if(c) {
                // Шлемо 0 на обидва підозрілі канали
                await c.writeValueWithoutResponse(new Uint8Array([1, 0, 0, 0, 0, 0, 0, 0]));
                await c.writeValueWithoutResponse(new Uint8Array([2, 0, 0, 0, 0, 0, 0, 0]));
            }
            document.getElementById('st').innerText = "🛑 STOPPED";
        }
    </script>
</body>
</html>
