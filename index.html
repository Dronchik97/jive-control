<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: #eee; text-align: center; font-family: sans-serif; padding: 20px; }
        .btn { padding: 20px; margin-bottom: 10px; border: none; border-radius: 12px; color: white; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        .connect { background: #0088cc; }
        .vibro { background: linear-gradient(90deg, #ff00ff, #800080); }
        .off { background: #ff5252; margin-top: 20px; }
        #status { color: #00ffcc; font-size: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="status">🔴 Offline</div>
    <button class="btn connect" onclick="connect()">🔌 CONNECT</button>

    <div class="card" style="background:#1a1a1a; padding:15px; border-radius:15px;">
        <p>РЕЖИМ "МУЗИКА" (Емуляція)</p>
        <button id="vibroBtn" class="btn vibro" onclick="toggleVibro()">START VIBRO GEN</button>
    </div>

    <button class="btn off" onclick="disconnect()">🚫 DISCONNECT / OFF</button>

    <script>
        let dev, char, timer;
        let isVibrating = false;

        async function connect() {
            try {
                dev = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await dev.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                char = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('status').innerText = "🟢 CONNECTED";
            } catch (e) { alert(e); }
        }

        async function send(h, v) {
            if (char) await char.writeValue(new Uint8Array([h, v]));
        }

        function toggleVibro() {
            isVibrating = !isVibrating;
            const btn = document.getElementById('vibroBtn');
            
            if (isVibrating) {
                btn.innerText = "STOP VIBRO GEN";
                // Шлемо команду кожні 50мс (як ритм музики)
                timer = setInterval(() => {
                    send(1, 8); // Можеш спробувати змінити на 1, 16 або 11, 8
                }, 50);
            } else {
                btn.innerText = "START VIBRO GEN";
                clearInterval(timer);
                send(1, 0);
            }
        }

        async function disconnect() {
            clearInterval(timer);
            if (dev && dev.gatt.connected) {
                await send(1, 0);
                await dev.gatt.disconnect();
                document.getElementById('status').innerText = "🔴 DISCONNECTED";
            }
        }
    </script>
</body>
</html>
