<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding: 20px; }
        .btn { padding: 20px; background: #222; border: 1px solid #0f0; color: #0f0; width: 100%; font-size: 18px; cursor: pointer; margin-bottom: 20px; }
        #log { text-align: left; font-size: 12px; border: 1px solid #333; padding: 10px; height: 200px; overflow-y: scroll; }
        input[type=range] { width: 100%; height: 50px; }
    </style>
</head>
<body>
    <h3>CBT001 TERMINAL</h3>
    <button class="btn" onclick="connect()">[ СКАНИРОВАТЬ ]</button>
    <input type="range" min="0" max="255" value="0" oninput="sendSpeed(this.value)">
    <div id="log">Ожидание запуска...</div>

    <script>
        let characteristic;

        function log(m) { document.getElementById('log').innerHTML += "<br>> " + m; }

        async function connect() {
            try {
                log("Запрос CBT001...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    // Добавляем все возможные стандартные сервисы
                    optionalServices: [
                        '0000ff10-0000-1000-8000-00805f9b34fb',
                        '0000ff00-0000-1000-8000-00805f9b34fb',
                        '0000fee9-0000-1000-8000-00805f9b34fb',
                        0xff10, 0xff00, 0xfee9, 0x180f, 0x180a
                    ]
                });

                log("Коннект к: " + device.name);
                const server = await device.gatt.connect();
                
                log("Поиск каналов связи...");
                // Пробуем найти хоть что-то
                const services = await server.getPrimaryServices();
                log("Найдено сервисов: " + services.length);

                for (const s of services) {
                    const chars = await s.getCharacteristics();
                    for (const c of chars) {
                        log("Канал: " + c.uuid);
                        if (c.properties.write || c.properties.writeWithoutResponse) {
                            characteristic = c;
                            log("✅ ПОРТ НАЙДЕН!");
                        }
                    }
                }
                
                if (characteristic) log("ГОТОВО. Двигай ползунок.");
                else log("❌ Порты записи не найдены.");
                
            } catch (e) {
                log("ОШИБКА: " + e.message);
            }
        }

        async function sendSpeed(v) {
            if (!characteristic) return;
            try {
                // CBT001 часто ждет прямой байт или пакет 0x01
                const data = new Uint8Array([0x01, parseInt(v)]);
                await characteristic.writeValueWithoutResponse(data);
            } catch (e) {}
        }
    </script>
</body>
</html>
