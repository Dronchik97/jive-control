<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive - Manual Setup</title>
    <style>
        body { background: #000; color: #00ff41; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: monospace; }
        .setup-box { border: 2px solid #00ff41; padding: 30px; border-radius: 20px; background: #111; text-align: center; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 250px; margin: 20px 0; font-family: monospace; font-size: 16px; text-align: center; }
        .btn { background: #00ff41; color: #000; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; border-radius: 10px; text-transform: uppercase; }
        .label { font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="setup-box">
    <div class="label">ВВЕДІТЬ ID ПРИСТРОЮ:</div>
    <input type="text" id="manualId" placeholder="Наприклад: 12345-abc-678">
    <br>
    <button class="btn" onclick="setManualId()">Зберегти та перейти</button>
</div>

<script>
    function setManualId() {
        const myId = document.getElementById('manualId').value;
        if (myId) {
            localStorage.setItem('lastDeviceId', myId);
            window.location.href = 'remote.html';
        } else {
            alert("Введи ID, не халяв!");
        }
    }
</script>

</body>
</html>
