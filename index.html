<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 15px; }
        .btn { padding: 15px; background: #0088cc; border: none; border-radius: 8px; color: white; width: 100%; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: #444; font-size: 13px; padding: 10px; border-radius: 5px; color: white; }
        #status { padding: 10px; border-radius: 5px; background: #222; font-size: 13px; color: #00ff00; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h3>Magic Motion: Пошук Вібрації</h3>
    <div id="status">Статус: Готовий</div>
    <button class="btn" onclick="connect()">🔌 1. КОННЕКТ</button>
    <button class="btn" style="background: #efa00b" onclick="sendMagic([0x01, 0x08])">⚡ 2. РЕЖИМ ГОТОВНОСТІ (1, 8)</button>

    <hr>
    <p>Спробуй ці команди для запуску вібро:</p>
    <div class="grid">
        <button class="mode-btn" onclick="sendMagic([0x01, 0x01])">Cmd: 1, 1</button>
        <button class="mode-btn" onclick="sendMagic([0x01, 0x05])">Cmd: 1, 5</button>
        <button class="mode-btn" onclick="sendMagic([0x0b, 0x01, 0x01])">Cmd: 11, 1, 1</button>
        <button class="mode-btn" onclick="sendMagic([0x10, 0x05])">Cmd: 16, 5</button>
        <button class="mode-btn" onclick="sendMagic([0x0d, 0x05])">Cmd: 13, 5</button>
        <button class="mode-btn" onclick="sendMagic([0x05, 0x01])">Cmd: 5, 1</button>
    </div>

    <button class="btn" style="background:#ff5252" onclick="sendMagic([0x01, 0x00])">🔴 СТОП (1, 0)</button>

    <script>
        let characteristic;
        const SERVICE_UUID = '78667579-7b48-43db-b8c5-7928a6b0a335';
        const CHAR_UUID    = '78667579-a914-49a4-8333-aa3c0cd8fedc';

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                document.getElementById('status').innerText = "ПІДКЛЮЧЕНО ✅";
            } catch (err) { alert(err); }
        }

        async function sendMagic(bytes) {
            if (!characteristic) return;
            try {
                await characteristic.writeValue(new Uint8Array(bytes));
            } catch (err) { console.log(err); }
        }
    </script>
</body>
</html>
