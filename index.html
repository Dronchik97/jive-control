<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Server | Poltava Node</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #00ff41; padding: 30px; border-radius: 20px; background: #111; display: inline-block; width: 350px; box-shadow: 0 0 20px rgba(0,255,65,0.4); }
        .btn-bt { background: #0088ff; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-server { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        input { background: #000; border: 1px solid #333; color: #00ff41; padding: 12px; width: 85%; margin: 15px 0; text-align: center; border-radius: 8px; font-size: 18px; }
        #log { font-size: 11px; color: #888; text-align: left; margin-top: 20px; height: 120px; overflow-y: auto; border-top: 1px solid #222; padding-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="box">
    <h3>🖥️ SERVER ADM UNIT</h3>
    
    <button class="btn-bt" onclick="connectBT()">🔗 ПІДКЛЮЧИТИ ПРИСТРІЙ</button>
    <div id="btStatus" style="font-size: 12px; margin-bottom: 15px; color: #666;">Статус: Очікування...</div>

    <hr style="border: 0.5px solid #222;">

    <input type="text" id="roomId" value="1234">
    <button class="btn-server" onclick="startGlobalServer()">🛰️ ЗАПУСТИТИ СЕРВЕР</button>
    
    <div id="log"></div>
</div>

<script>
    let toyChar, mqttClient;

    function addLog(m) {
        const logBox = document.getElementById('log');
        logBox.innerHTML += `> ${m}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function connectBT() {
        try {
            addLog("Шукаю іграшку...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            addLog("З'єднано з: " + device.name);
            
            const services = await server.getPrimaryServices();
            for (let s of services) {
                const chars = await s.getCharacteristics();
                toyChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                if (toyChar) break;
            }
            if (toyChar) {
                document.getElementById('btStatus').innerText = "✅ ПІДКЛЮЧЕНО";
                document.getElementById('btStatus').style.color = "#00ff41";
            }
        } catch (e) { addLog("Помилка BT: " + e.message); }
    }

    function startGlobalServer() {
        const id = document.getElementById('roomId').value;
        if (!id) return alert("Введи ID!");

        addLog("Спроба запуску сервера...");
        
        // Підключаємося до хмарного брокера
        mqttClient = mqtt.connect('wss://test.mosquitto.org:8081');
        
        mqttClient.on('connect', () => {
            addLog("📡 СЕРВЕР ONLINE");
            addLog("Слухаю канал: jive/" + id);
            mqttClient.subscribe("jive/" + id);
            // Робимо кнопку зеленішою, шоб видно було
            document.querySelector('.btn-server').style.boxShadow = "0 0 20px #00ff41";
        });

        mqttClient.on('message', (topic, msg) => {
            try {
                const data = JSON.parse(msg.toString());
                addLog(`Команда отримана: M1:${data.m1} M2:${data.m2}`);
                if (toyChar) {
                    toyChar.writeValueWithoutResponse(new Uint8Array([0xFF, data.m1, data.m2]));
                }
            } catch (e) { console.log("Data error", e); }
        });

        mqttClient.on('error', (e) => { addLog("Помилка мережі: " + e); });
    }
</script>
</body>
</html>
