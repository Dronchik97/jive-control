<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Remote | Client</title>
    <style>
        :root { --neon: #00ff41; }
        body { background: #0b0e14; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .pult { width: 300px; background: #161b22; border-radius: 40px; padding: 30px; border: 2px solid var(--neon); box-shadow: 0 0 30px rgba(0,255,65,0.2); text-align: center; }
        
        .input-group { margin-bottom: 25px; }
        input[type="text"] { background: #000; border: 1px solid #333; color: var(--neon); padding: 10px; border-radius: 10px; width: 80%; text-align: center; }
        
        /* СТИЛЬНИЙ ПОВЗУНОК */
        .slider { width: 100%; margin: 30px 0; -webkit-appearance: none; background: #000; height: 10px; border-radius: 5px; outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; background: var(--neon); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--neon); }

        .btn-stop { background: #ff4141; color: #000; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-send { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="pult">
    <div id="loginSection">
        <h3>ВВЕДІТЬ ID ПУЛЬТА</h3>
        <input type="text" id="clientPass" placeholder="Пароль від стрімера">
        <button class="btn-send" style="margin-top:15px;" onclick="checkAccess()">УВІЙТИ</button>
    </div>

    <div id="controlSection" style="display:none;">
        <h2 style="color:var(--neon)">📡 REMOTE CONTROL</h2>
        
        <p>ІНТЕНСИВНІСТЬ:</p>
        <input type="range" min="0" max="255" value="0" class="slider" id="vibeRange" oninput="updateRange(this.value)">
        <div id="valDisplay">0%</div>

        <button class="btn-stop" onclick="stopVibe()">⛔ STOP</button>
    </div>
</div>

<script>
    function checkAccess() {
        const input = document.getElementById('clientPass').value;
        const saved = localStorage.getItem('remote_pass');
        
        if(input === saved) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('controlSection').style.display = 'block';
        } else {
            alert("Невірний ID!");
        }
    }

    function updateRange(val) {
        let percent = Math.round((val / 255) * 100);
        document.getElementById('valDisplay').innerText = percent + "%";
        // Тут ми шлемо команду (якщо реалізовано через сокети або спільну пам'ять)
        console.log("Швидкість: " + val);
    }

    function stopVibe() {
        document.getElementById('vibeRange').value = 0;
        updateRange(0);
    }
</script>
</body>
</html>
