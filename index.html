<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #ff0000; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #ff0000; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        #disp { font-size: 28px; margin: 20px; color: #fff; background: #222; padding: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: 3-BYTE FORCE</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn" style="background:#0066ff; color:white" onclick="conn()">🔌 1. КОННЕКТ</button>
        <div id="disp">[1, 0, 0]</div>
        <button class="btn" style="background:#ff0000; color:white" onclick="runScan()">🚀 СТАРТ (3-BYTE SCAN)</button>
        <button class="btn" style="background:#fff; color:#000" onclick="stopScan()">🛑 СТОП</button>
    </div>

    <script>
        let d, ch, scanner;
        let val = 1;
        const blackList = [8, 10]; 

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
            } catch (e) { alert(e); }
        }

        async function runScan() {
            if(!ch) return;
            val = 1;
            clearInterval(scanner);
            scanner = setInterval(async () => {
                if(val > 255) { stopScan(); return; }
                if(blackList.includes(val)) { val++; return; }

                document.getElementById('disp').innerText = `[1, 0, ${val}]`;
                try {
                    // Пробуємо заголовок 1, але з трьома байтами. 
                    // Вібро часто сидить на 3-му байті в таких моделях.
                    await ch.writeValueWithoutResponse(new Uint8Array([1, 0, val]));
                } catch (e) {}
                val++; 
            }, 150); 
        }

        function stopScan() {
            clearInterval(scanner);
            document.getElementById('st').innerText = "🛑 СТОП";
        }
    </script>
</body>
</html>
