<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 20px; }
        button { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 15px; width: 100%; margin: 5px 0; cursor: pointer; }
        .control { margin: 20px 0; padding: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h3>JIVE: SILENT SCANNER</h3>
    <button onclick="connect()">🔌 1. ТИХИЙ КОННЕКТ</button>
    <button onclick="stopAll()" style="color:red; border-color:red">🛑 2. ПРИМУСОВИЙ СТОП</button>

    <div class="control">
        <p>СКАН ЗАГОЛОВКІВ (Header):</p>
        <button onclick="scanHeaders()">🚀 ПОЧАТИ СКАН (Header 1-255)</button>
        <p id="currH">Заголовок: 0</p>
    </div>

    <script>
        let ch;
        async function connect() {
            const dev = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
            });
            const s = await dev.gatt.connect();
            const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
            ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
            alert("Підключено! Не чіпай нічого, він має мовчати.");
        }

        async function stopAll() {
            // Шлемо всі можливі варіанти "Стоп"
            await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
            await ch.writeValueWithoutResponse(new Uint8Array([0, 0, 0]));
            await ch.writeValueWithoutResponse(new Uint8Array([11, 0, 0]));
        }

        async function scanHeaders() {
            // Перебір заголовків від 0 до 255
            for(let h = 0; h < 256; h++) {
                document.getElementById('currH').innerText = "Заголовок: " + h;
                try {
                    // Шлемо заголовок + 0 швидкість + 0 режим
                    await ch.writeValueWithoutResponse(new Uint8Array([h, 0, 0]));
                    await new Promise(r => setTimeout(r, 100)); // Затримка 100мс
                } catch(e) {}
            }
        }
    </script>
</body>
</html>
