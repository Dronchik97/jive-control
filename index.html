<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #050505; color: #00ff00; text-align: center; font-family: monospace; padding: 20px; }
        .box { border: 2px dashed #00ff00; padding: 20px; border-radius: 10px; background: #001100; }
        .btn { padding: 15px; margin: 5px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        .conn { background: #0044ff; color: white; }
        .send { background: #00ff00; color: black; }
        .off { background: #aa0000; color: white; }
        input[type=range] { width: 100%; margin: 20px 0; }
        .label { font-size: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>JIVE DEEP SCANNER</h3>
        <div id="st">Статус: ВІДКЛЮЧЕНО</div>
        <button class="btn conn" onclick="cn()">1. ПІДКЛЮЧИТИСЬ</button>
        
        <hr>
        
        <div class="label">ЗАГОЛОВОК (Byte 1): <span id="hV">1</span></div>
        <input type="range" min="0" max="20" value="1" id="hS" oninput="update()">
        
        <div class="label">ЗНАЧЕННЯ (Byte 2): <span id="vV">0</span></div>
        <input type="range" min="0" max="255" value="0" id="vS" oninput="update()">

        <button class="btn send" onclick="sd()">ВІДПРАВИТИ КОМАНДУ</button>
        <button class="btn off" onclick="kill()">🚫 ВІДКЛЮЧИТИСЬ</button>
    </div>

    <script>
        let d, c;
        function update() {
            document.getElementById('hV').innerText = document.getElementById('hS').value;
            document.getElementById('vV').innerText = document.getElementById('vS').value;
            // Відправляємо відразу при русі повзунка для швидкості
            sd(); 
        }

        async function cn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "Статус: ГОТОВО";
            } catch (e) { alert(e); }
        }

        async function sd() {
            if (!c) return;
            let h = parseInt(document.getElementById('hS').value);
            let v = parseInt(document.getElementById('vS').value);
            try {
                // Шлемо стандартну пачку з 2 байт
                await c.writeValueWithoutResponse(new Uint8Array([h, v]));
            } catch (e) {}
        }

        async function kill() {
            if (d) await d.gatt.disconnect();
            document.getElementById('st').innerText = "Статус: ВІДКЛЮЧЕНО";
        }
    </script>
</body>
</html>
