<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        button { padding: 15px; width: 90%; margin: 10px 0; border-radius: 10px; border: 2px solid #0f0; background: #000; color: #0f0; font-weight: bold; font-size: 18px; }
        button:active { background: #0f0; color: #000; }
        input[type=range] { width: 90%; height: 30px; }
        .box { border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>JIVE FIX 8T</h2>
    <div id="st">СТАТУС: OFF</div>
    
    <button onclick="connectBT()">🔌 ПІДКЛЮЧИТИ BT</button>

    <div class="box">
        <p>ВІБРО: <span id="vNum">0</span></p>
        <input type="range" min="0" max="255" value="0" id="vS" oninput="run()">
    </div>

    <div class="box">
        <p>ТОЛКАЧКИ (РЕЖИМИ):</p>
        <button onclick="setM(1)">MODE 1</button>
        <button onclick="setM(2)">MODE 2</button>
        <button onclick="setM(3)">MODE 3</button>
        <button onclick="setM(5)">MODE 5</button>
        <button onclick="setM(11)">MODE 11</button>
    </div>

    <button style="border-color: red; color: red;" onclick="stop()">🛑 СТОП</button>

    <script>
        let ch;
        let mode = 0;

        async function connectBT() {
            try {
                // Прямий запит без лишніх перевірок
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                ch = await service.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                
                document.getElementById('st').innerText = "🟢 CONNECTED";
                // Сигнал пробудження
                await ch.writeValueWithoutResponse(new Uint8Array([0xff, 0xff, 0xff]));
            } catch (e) {
                alert("Трабла: " + e.message);
            }
        }

        async function setM(m) {
            mode = m;
            await run();
        }

        async function run() {
            if (!ch) return;
            let v = parseInt(document.getElementById('vS').value);
            document.getElementById('vNum').innerText = v;
            
            // На основі твого лога: Байт 1=1, Байт 2=Режим, Байт 3=Швидкість
            try {
                await ch.writeValueWithoutResponse(new Uint8Array([1, mode, v]));
            } catch (e) {}
        }

        async function stop() {
            if (ch) {
                document.getElementById('vS').value = 0;
                document.getElementById('vNum').innerText = 0;
                mode = 0;
                await ch.writeValueWithoutResponse(new Uint8Array([1, 0, 0]));
            }
        }
    </script>
</body>
</html>
