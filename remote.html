<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jive Remote | Control</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0e14; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .pult { max-width: 400px; margin: auto; background: #111; padding: 30px; border-radius: 40px; border: 2px solid #0f0; box-shadow: 0 0 30px rgba(0,255,0,0.2); }
        input[type=text] { background: #000; border: 1px solid #333; color: #0f0; padding: 15px; width: 80%; border-radius: 12px; margin-bottom: 10px; font-size: 18px; text-align: center; }
        .btn-conn { background: #0f0; color: #000; border: none; padding: 15px; width: 85%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .container { display: flex; justify-content: space-around; margin-top: 20px; }
        .box { background: #000; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        input[type=range] { appearance: slider-vertical; width: 60px; height: 250px; cursor: pointer; }
        .val { font-size: 28px; margin-top: 15px; font-weight: bold; }
        .stop-btn { background: #ff4141; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 20px; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="pult">
        <input type="text" id="targetId" value="1234">
        <button class="btn-conn" onclick="connectToHost()">УВІЙТИ</button>
        <p id="status">Статус: Немає зв'язку</p>

        <div class="container">
            <div class="box">
                <div style="color:#00ffff; margin-bottom: 10px;">📳 VIBRO</div>
                <input type="range" id="vSlider" min="0" max="29" value="0">
                <div id="vVal" class="val" style="color:#00ffff">0</div>
            </div>
            <div class="box">
                <div style="color:#ffff00; margin-bottom: 10px;">🚀 PUSHER</div>
                <input type="range" id="pSlider" min="0" max="100" value="0">
                <div id="pVal" class="val" style="color:#ffff00">0</div>
            </div>
        </div>
        
        <button class="stop-btn" onclick="stopAll()">⛔ EMERGENCY STOP</button>
    </div>

    <script>
        let conn;
        const peer = new Peer();

        function connectToHost() {
            const id = document.getElementById('targetId').value;
            conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('status').innerText = "✅ ПІДКЛЮЧЕНО!";
                document.getElementById('status').style.color = "#ffff00";
            });
        }

        document.getElementById('vSlider').oninput = function() {
            let v = parseInt(this.value);
            let finalV = (v > 0 && v < 6) ? 6 : v; // Твоя логіка з коду
            document.getElementById('vVal').innerText = finalV;
            if (conn && conn.open) conn.send({type: 'v', val: finalV});
        };

        document.getElementById('pSlider').oninput = function() {
            let v = parseInt(this.value);
            let finalV = (v > 0 && v < 32) ? 32 : v; // Твоя логіка з коду
            document.getElementById('pVal').innerText = finalV;
            if (conn && conn.open) conn.send({type: 'p', val: finalV});
        };

        function stopAll() {
            document.getElementById('vSlider').value = 0;
            document.getElementById('pSlider').value = 0;
            document.getElementById('vVal').innerText = 0;
            document.getElementById('pVal').innerText = 0;
            if (conn && conn.open) {
                conn.send({type: 'v', val: 0});
                conn.send({type: 'p', val: 0});
            }
        }
    </script>
</body>
</html>
