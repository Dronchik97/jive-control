<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Server | Global</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #00ff41; padding: 20px; border-radius: 15px; background: #111; display: inline-block; width: 300px; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #log { font-size: 10px; color: #555; text-align: left; margin-top: 20px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h3>📡 GLOBAL SERVER</h3>
        <div id="stat">STATUS: READY</div>
        <button onclick="connectBT()">1. ПІДКЛЮЧИТИ ІГРАШКУ</button>
        <div id="log"></div>
    </div>

    <script>
        let toyChar;
        const TOPIC = "andrii_jive_vibe_999"; // Твій унікальний канал в інтернеті
        const client = mqtt.connect('wss://test.mosquitto.org:8081');

        function addLog(m) { document.getElementById('log').innerHTML += `> ${m}<br>`; }

        client.on('connect', () => {
            addLog("Підключено до хмари");
            client.subscribe(TOPIC);
        });

        client.on('message', (topic, message) => {
            const speed = parseInt(message.toString());
            addLog("Отримано з мережі: " + speed);
            if (toyChar) {
                toyChar.writeValueWithoutResponse(new Uint8Array([0xFF, speed]));
            }
        });

        async function connectBT() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                for (let s of services) {
                    const chars = await s.getCharacteristics();
                    toyChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                    if (toyChar) break;
                }
                if (toyChar) {
                    document.getElementById('stat').innerText = "✅ ONLINE";
                    addLog("Іграшка готова до команд!");
                }
            } catch (e) { addLog("Error: " + e); }
        }
    </script>
</body>
</html>
