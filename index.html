<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; background: #333; color: white; }
        .vibe { background: #ff00ff; color: #fff; }
        .stop { background: #f00; color: #fff; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: MUSIC vs VIBE</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn" style="background:#0066ff" onclick="conn()">🔌 ПІДКЛЮЧИТИСЬ</button>

        <p>Спробуй ці кнопки. Шукаємо де вібро без толкачок:</p>
        
        <button class="btn vibe" onclick="send([16, 120])">ВІБРО (Канал 16)</button>
        <button class="btn vibe" onclick="send([11, 120])">ВІБРО (Канал 11)</button>
        <button class="btn vibe" onclick="send([4, 120])">ВІБРО (Канал 4)</button>
        
        <hr>
        <p>Режим "Тільки 2-й мотор":</p>
        <button class="btn vibe" onclick="send([1, 0, 150])">1-й: 0, 2-й: 150</button>

        <button class="btn stop" onclick="fullStop()">🛑 СТОП</button>
    </div>

    <script>
        let d, c;

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ГОТОВО";
            } catch (e) { alert(e); }
        }

        async function send(arr) {
            if (!c) return;
            try { await c.writeValueWithoutResponse(new Uint8Array(arr)); } catch (e) {}
        }

        async function fullStop() {
            if(c) {
                await c.writeValueWithoutResponse(new Uint8Array([1, 0]));
                await c.writeValueWithoutResponse(new Uint8Array([16, 0]));
            }
            document.getElementById('st').innerText = "🛑 STOP";
        }
    </script>
</body>
</html>
