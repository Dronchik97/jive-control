<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Jive Remote - Manual Mode</title>
    <style>
        /* Весь той самий дизайн пульта, шо ми робили раніше */
        :root { --neon: #00ff41; }
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .remote-case { width: 240px; height: 480px; background: #111; border: 2px solid #222; border-radius: 55px; padding: 30px; text-align: center; position: relative; }
        #vibe-level { width: 10px; background: var(--neon); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); transition: 0.1s; box-shadow: 0 0 15px var(--neon); }
        .bar-bg { width: 10px; height: 150px; background: #000; margin: 20px auto; position: relative; border-radius: 5px; }
        #statusInfo { font-size: 11px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="remote-case">
    <div style="font-size: 10px; color: #666; margin-bottom: 20px;">TARGET ID: <br><span id="targetId" style="color:#00ff41">???</span></div>
    
    <div class="bar-bg">
        <div id="vibe-level" style="height: 0%;"></div>
    </div>

    <button onclick="linkToId()" style="background:#00ff41; color:#000; border:none; padding:15px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer;">ПІДКЛЮЧИТИСЯ</button>
    
    <div id="statusInfo">Очікування...</div>
</div>

<script>
    let toyChar;
    let audioCtx, analyser, dataArr;
    
    // Беремо твій ID з пам'яті
    const myCustomId = localStorage.getItem('lastDeviceId');
    document.getElementById('targetId').innerText = myCustomId || "Не задано";

    async function linkToId() {
        try {
            document.getElementById('statusInfo').innerText = "Шукаю твій ID...";
            
            // Браузер все одно спитає підтвердження, але ми фільтруємо по твому ID
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ id: myCustomId }],
                optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000fee9-0000-1000-8000-00805f9b34fb');
            const chars = await service.getCharacteristics();
            toyChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);

            if (toyChar) {
                document.getElementById('statusInfo').innerText = "ЗВ'ЯЗОК Є!";
                startAudio();
            }
        } catch (e) {
            document.getElementById('statusInfo').innerText = "Помилка: " + e;
        }
    }

    async function startAudio() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArr = new Uint8Array(analyser.frequencyBinCount);
        monitor();
    }

    function monitor() {
        analyser.getByteFrequencyData(dataArr);
        let sum = 0;
        for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
        let vol = Math.round(sum / dataArr.length);

        document.getElementById('vibe-level').style.height = Math.min(vol * 2.5, 100) + "%";

        if (vol > 15 && toyChar) {
            let speed = Math.min(vol * 5, 255);
            toyChar.writeValueWithoutResponse(new Uint8Array([0xFF, speed]));
        } else if (toyChar) {
            toyChar.writeValueWithoutResponse(new Uint8Array([0xFF, 0]));
        }
        requestAnimationFrame(monitor);
    }
</script>

</body>
</html>
