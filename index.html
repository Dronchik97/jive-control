<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        button { padding: 20px; background: #222; color: #fff; border: 1px solid #444; font-weight: bold; cursor: pointer; }
        button:active { background: #00ff00; color: #000; }
        .info { color: #888; font-size: 14px; margin: 10px; }
    </style>
</head>
<body>
    <h3>JIVE INDEX DECODER</h3>
    <p>Ми знаємо: 8 = толкачки, 10 = світло S</p>
    
    <button onclick="conn()" style="background: #0066ff; width: 90%; padding: 15px;">🔌 ПІДКЛЮЧИТИСЬ</button>

    <div class="grid">
        <button onclick="send(1)">1</button>
        <button onclick="send(2)">2</button>
        <button onclick="send(3)">3</button>
        <button onclick="send(4)">4</button>
        <button onclick="send(5)">5</button>
        <button onclick="send(6)">6</button>
        <button onclick="send(7)">7</button>
        <button onclick="send(9)">9</button>
        <button onclick="send(11)">11</button>
    </div>

    <div class="info">Пробуй натиснути "9" або "1-5". Якщо зависне — ти знаєш, що робити з Bluetooth!</div>

    <script>
        let ch;
        async function conn() {
            const d = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
            });
            const s = await d.gatt.connect();
            const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
            ch = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
            alert("CONNECTED");
        }

        async function send(idx) {
            if(!ch) return;
            // Пробуємо посилати індекс і середню потужність (128)
            // Якщо вібро не заводиться, спробуємо [idx, 255]
            await ch.writeValueWithoutResponse(new Uint8Array([1, idx, 128]));
            console.log("Sent Mode:", idx);
        }
    </script>
</body>
</html>
