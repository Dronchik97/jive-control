<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .conn { background: #0066ff; color: #fff; }
        .start { background: #ff00ff; color: #fff; }
        .stop { background: #f00; color: #fff; }
        #cur { font-size: 48px; margin: 20px; color: #fff; }
        .log { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE AUTO-SCANNER</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn conn" onclick="conn()">🔌 1. КОННЕКТ</button>
        
        <div id="cur">0</div>
        
        <button class="btn start" id="sBtn" onclick="startScan()">🚀 ЗАПУСТИТИ АВТОСКАН</button>
        <button class="btn stop" onclick="stopScan()">🛑 СТОП (ЗАПАМ'ЯТАЙ ЦИФРУ)</button>
        
        <div class="log">Пропускаємо: 8, 10</div>
    </div>

    <script>
        let d, c, scanner;
        let currentIdx = 1;
        const skip = [8, 10]; // Твій чорний список

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 ПІДКЛЮЧЕНО";
            } catch (e) { alert(e); }
        }

        async function startScan() {
            if(!c) return;
            document.getElementById('sBtn').disabled = true;
            
            scanner = setInterval(async () => {
                // Перевіряємо, чи не в списку виключень
                while(skip.includes(currentIdx)) {
                    currentIdx++;
                }

                if(currentIdx > 255) {
                    stopScan();
                    alert("Сканування закінчено!");
                    return;
                }

                document.getElementById('cur').innerText = currentIdx;
                
                try {
                    // Шлемо [1, індекс, 255] для максимального ефекту
                    await c.writeValueWithoutResponse(new Uint8Array([1, currentIdx, 255]));
                } catch (e) {}

                currentIdx++;
            }, 1500); // 1.5 секунди на кожну цифру, щоб ти встиг зреагувати
        }

        function stopScan() {
            clearInterval(scanner);
            document.getElementById('sBtn').disabled = false;
            document.getElementById('st').innerText = "🛑 ЗУПИНЕНО НА " + (currentIdx - 1);
        }
    </script>
</body>
</html>
