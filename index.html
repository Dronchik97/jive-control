<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #050505; color: #00ff00; text-align: center; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #00ff00; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; background: #0044ff; color: white; }
        .stop { background: #aa0000; }
        input[type=range] { width: 100%; height: 30px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>JIVE: CHECKSUM MODE</h3>
        <div id="st">СТАТУС: OFF</div>
        <button class="btn" onclick="conn()">🔌 1. КОННЕКТ</button>

        <div style="margin: 20px 0;">
            <label>ПОТУЖНІСТЬ: <span id="pV">150</span></label>
            <input type="range" min="0" max="255" value="150" id="pwr" oninput="document.getElementById('pV').innerText=this.value; sendVibe();">
        </div>

        <button class="btn stop" onclick="fullStop()">🛑 СТОП</button>
    </div>

    <script>
        let d, c;

        async function conn() {
            try {
                d = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true, optionalServices: ['78667579-7b48-43db-b8c5-7928a6b0a335']
                });
                const s = await d.gatt.connect();
                const sv = await s.getPrimaryService('78667579-7b48-43db-b8c5-7928a6b0a335');
                c = await sv.getCharacteristic('78667579-a914-49a4-8333-aa3c0cd8fedc');
                document.getElementById('st').innerText = "🟢 CONNECTED";
            } catch (e) { alert(e); }
        }

        async function sendVibe() {
            if (!c) return;
            let val = parseInt(document.getElementById('pwr').value);
            
            // Формуємо пакет: [Заголовок, Значення, Сума]
            // Багато китайських Thrusting девайсів працюють саме так
            let header = 1; 
            let checksum = (header + val) & 0xFF; 
            let packet = new Uint8Array([header, val, checksum]);

            try {
                await c.writeValueWithoutResponse(packet);
                console.log("Sent with checksum:", packet);
            } catch (e) {}
        }

        async function fullStop() {
            if(c) await c.writeValueWithoutResponse(new Uint8Array([1, 0, 1]));
        }
    </script>
</body>
</html>
